// SPEECH ENGINE (identical to Markowitz version)
// ═══════════════════════════════════════════════════════
const Speech={
  synth:window.speechSynthesis,voices:[],selectedVoice:null,rate:1.0,pitch:1.0,vol:1.0,
  enabled:true,currentUtter:null,iosResumeTimer:null,
  init(){
    const load=()=>{this.voices=this.synth.getVoices();this.populateVoiceSelect();};
    load();if(this.synth.onvoiceschanged!==undefined)this.synth.onvoiceschanged=load;
  },
  populateVoiceSelect(){
    const sel=document.getElementById('voice-select');sel.innerHTML='';
    if(!this.voices.length){sel.innerHTML='<option>No voices available</option>';return;}
    const enV=this.voices.filter(v=>v.lang.startsWith('en'));
    const other=this.voices.filter(v=>!v.lang.startsWith('en'));
    [...enV,...other].forEach(v=>{const opt=document.createElement('option');opt.value=v.name;opt.textContent=`${v.name} (${v.lang})`;sel.appendChild(opt);});
    // Prefer Google UK English Male, then any UK male, then any English male
    const googleUKMale=this.voices.find(v=>/google\suk\senglish\smale/i.test(v.name));
    const ukMale=this.voices.find(v=>v.lang==='en-GB'&&/male/i.test(v.name));
    const anyUKEn=this.voices.find(v=>v.lang==='en-GB');
    const maleKw=/google\suk|daniel|james|oliver|google\senglish\smale/i;
    const maleEn=enV.filter(v=>maleKw.test(v.name));
    this.selectedVoice=googleUKMale||ukMale||maleEn[0]||anyUKEn||enV[0]||this.voices[0];
    if(this.selectedVoice)sel.value=this.selectedVoice.name;
    document.getElementById('voice-badge').textContent=this.selectedVoice?this.selectedVoice.lang.toUpperCase().slice(0,5):'TTS';
  },
  setVoice(name){this.selectedVoice=this.voices.find(v=>v.name===name)||this.selectedVoice;document.getElementById('voice-badge').textContent=this.selectedVoice?this.selectedVoice.lang.toUpperCase().slice(0,5):'TTS';},
  speak(text,onend){
    if(!this.enabled||!text)return;this.stop();narrationDone=false;
    const utter=new SpeechSynthesisUtterance(text);
    if(this.selectedVoice)utter.voice=this.selectedVoice;
    utter.rate=this.rate;utter.pitch=this.pitch;utter.volume=this.vol;this.currentUtter=utter;
    const el=document.getElementById('narration-text');el.textContent=text;el.style.transform='translateX(0)';
    utter.onstart=()=>{
      document.getElementById('speaking-dot').classList.add('active');
      this.iosResumeTimer=setInterval(()=>{if(this.synth.paused)this.synth.resume();},12000);
    };
    utter.onboundary=e=>{
      if(e.name==='word'){const progress=e.charIndex/text.length;const maxScroll=Math.max(0,el.scrollWidth-el.parentElement.clientWidth);el.style.transform=`translateX(${-progress*maxScroll}px)`;}
    };
    utter.onend=()=>{document.getElementById('speaking-dot').classList.remove('active');clearInterval(this.iosResumeTimer);narrationDone=true;if(onend)onend();};
    utter.onerror=()=>{document.getElementById('speaking-dot').classList.remove('active');clearInterval(this.iosResumeTimer);};
    this.synth.speak(utter);
  },
  stop(){clearInterval(this.iosResumeTimer);this.synth.cancel();document.getElementById('speaking-dot').classList.remove('active');this.currentUtter=null;},
  pause(){if(this.synth.speaking)this.synth.pause();},
  resume(){if(this.synth.paused)this.synth.resume();},
  toggle(){
    this.enabled=!this.enabled;const btn=document.getElementById('btn-voice');
    if(this.enabled){btn.classList.add('on');btn.innerHTML='&#128264;';}
    else{btn.classList.remove('on');btn.innerHTML='&#128263;';this.stop();document.getElementById('narration-text').textContent='(narration off)';}
  }
};

// ENGINE
// ═══════════════════════════════════════════════════════
const canvas=document.getElementById('main-canvas');const ctx=canvas.getContext('2d');
let W,H;
function resizeCanvas(){const panel=canvas.parentElement;const eqH=document.getElementById('eq-layer').offsetHeight;W=panel.clientWidth;H=Math.max(60,panel.clientHeight-eqH);canvas.width=W;canvas.height=H;}
const SCENE_DURATIONS=[38,42,40,44,42,40,38,36,40,38,38,42,40,38,36,42,42,38,40,38,36,42,42,42,38,40,42,42,40,46,44,42,50,38];
SCENES.forEach((s,i)=>{s.duration=SCENE_DURATIONS[i]||s.duration;});
let currentScene=0,isPlaying=false,rafId=null,lastTimestamp=0,elapsedInScene=0,iosUnlocked=false,narrationDone=false;
const TOTAL_DURATION=SCENES.reduce((a,s)=>a+s.duration,0);
function totalUpTo(idx){let t=0;for(let i=0;i<idx;i++)t+=SCENES[i].duration;return t;}
function showEquations(scene,progress){
  ['eq0','eq1','eq2'].forEach((id,i)=>{
    const el=document.getElementById(id);const delay=i*.18+.08;
    if(i<scene.eqs.length&&progress>delay){
      if(!el.classList.contains('show')){
        el.innerHTML='';
        if(scene.eqs[i].label){const lbl=document.createElement('span');lbl.className='eq-label';lbl.textContent=scene.eqs[i].label;el.appendChild(lbl);}
        const kEl=document.createElement('span');el.appendChild(kEl);renderK(kEl,scene.eqs[i].latex);el.classList.add('show');
      }
    }else{el.classList.remove('show');el.innerHTML='';}
  });
}
function updateInfoPanel(scene,idx){
  document.getElementById('scene-num').textContent=`Scene ${idx+1}/${SCENES.length}  ·  ${scene.stageName}`;
  document.getElementById('scene-title').textContent=scene.title;
  document.getElementById('scene-subtitle').textContent=scene.subtitle;
  document.getElementById('interp-content').innerHTML=scene.interp;
  setTimeout(()=>document.querySelectorAll('.insight').forEach((el,i)=>setTimeout(()=>el.classList.add('lit'),i*300+500)),150);
}
function updateBreadcrumb(stage){
  document.querySelectorAll('.crumb').forEach(c=>{c.classList.remove('active');if(parseInt(c.dataset.stage)===stage)c.classList.add('active');});
}
function updateProgress(globalT){
  const pct=(globalT/TOTAL_DURATION)*100;document.getElementById('progress-fill').style.width=pct+'%';
  const fmt=s=>`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
  document.getElementById('time-current').textContent=fmt(globalT);document.getElementById('time-total').textContent=fmt(TOTAL_DURATION);
}
function buildMarkers(){
  const container=document.getElementById('scene-markers');container.innerHTML='';
  let acc=0;SCENES.forEach((s,i)=>{if(i>0){const mark=document.createElement('div');mark.className='scene-mark';mark.style.left=(acc/TOTAL_DURATION*100)+'%';container.appendChild(mark);}acc+=s.duration;});
}
function updateCountdown(prog,dur){
  const remaining=(1-prog)*dur;document.getElementById('cr-arc').style.strokeDashoffset=(88*(1-(1-prog))).toFixed(2);document.getElementById('countdown-label').textContent=Math.ceil(remaining)+'s';
}
function goToScene(idx,forcePlay){
  if(idx<0||idx>=SCENES.length)return;Speech.stop();narrationDone=false;currentScene=idx;elapsedInScene=0;
  const scene=SCENES[idx];updateInfoPanel(scene,idx);updateBreadcrumb(scene.stage);document.getElementById('scene-counter').textContent=`${idx+1}/${SCENES.length}`;
  ['eq0','eq1','eq2'].forEach(id=>{const el=document.getElementById(id);el.classList.remove('show');el.innerHTML='';});
  if(Speech.enabled&&(isPlaying||forcePlay))Speech.speak(NARRATIONS[idx]);
  else if(Speech.enabled)document.getElementById('narration-text').textContent=NARRATIONS[idx];
  if(forcePlay&&!isPlaying)togglePlay();
}
function togglePlay(){
  if(!iosUnlocked&&/iPhone|iPad|iPod/.test(navigator.userAgent)){document.getElementById('ios-unlock').classList.add('show');return;}
  isPlaying=!isPlaying;const btn=document.getElementById('btn-play');
  btn.innerHTML=isPlaying?'&#9646;&#9646;':'&#9654;';btn.classList.toggle('playing',isPlaying);
  if(isPlaying){lastTimestamp=performance.now();Speech.speak(NARRATIONS[currentScene]);if(!rafId)rafId=requestAnimationFrame(mainLoop);}
  else Speech.pause();
}
function mainLoop(timestamp){
  if(!isPlaying){rafId=null;return;}
  const dt=(timestamp-lastTimestamp)/1000;lastTimestamp=timestamp;elapsedInScene+=dt;
  const scene=SCENES[currentScene];const prog=Math.min(elapsedInScene/scene.duration,1);
  resizeCanvas();scene.canvasRender(ctx,W,H,prog);showEquations(scene,prog);
  updateProgress(Math.min(totalUpTo(currentScene)+elapsedInScene,TOTAL_DURATION));
  updateCountdown(prog,scene.duration);
  if(elapsedInScene>=scene.duration&&(narrationDone||!Speech.enabled||!Speech.synth.speaking)){
    if(currentScene<SCENES.length-1)goToScene(currentScene+1,false);
    else{isPlaying=false;Speech.stop();document.getElementById('btn-play').innerHTML='&#9654;';document.getElementById('btn-play').classList.remove('playing');rafId=null;return;}
  }
  rafId=requestAnimationFrame(mainLoop);
}
// Progress bar
const progressBar=document.getElementById('progress-bar');let isDragging=false;
function getBarPct(e){const rect=progressBar.getBoundingClientRect();const clientX=e.touches?e.touches[0].clientX:e.clientX;return Math.max(0,Math.min(1,(clientX-rect.left)/rect.width));}
function seekTo(pct){
  const target=pct*TOTAL_DURATION;let acc=0;
  for(let i=0;i<SCENES.length;i++){if(acc+SCENES[i].duration>target||i===SCENES.length-1){Speech.stop();elapsedInScene=target-acc;currentScene=i;updateInfoPanel(SCENES[i],i);updateBreadcrumb(SCENES[i].stage);document.getElementById('scene-counter').textContent=`${i+1}/${SCENES.length}`;if(!isPlaying){resizeCanvas();const sp=Math.min(elapsedInScene/SCENES[i].duration,1);SCENES[i].canvasRender(ctx,W,H,sp);showEquations(SCENES[i],sp);updateProgress(target);document.getElementById('narration-text').textContent=NARRATIONS[i];}else Speech.speak(NARRATIONS[i]);break;}acc+=SCENES[i].duration;}
}
progressBar.addEventListener('mousedown',e=>{isDragging=true;seekTo(getBarPct(e));});
progressBar.addEventListener('touchstart',e=>{isDragging=true;seekTo(getBarPct(e));},{passive:true});
document.addEventListener('mousemove',e=>{if(isDragging)seekTo(getBarPct(e));});
document.addEventListener('touchmove',e=>{if(isDragging)seekTo(getBarPct(e));},{passive:true});
document.addEventListener('mouseup',()=>{isDragging=false;});document.addEventListener('touchend',()=>{isDragging=false;});
// Controls
document.getElementById('btn-play').addEventListener('click',togglePlay);
document.getElementById('btn-prev').addEventListener('click',()=>{if(currentScene>0)goToScene(currentScene-1,isPlaying);else elapsedInScene=0;});
document.getElementById('btn-next').addEventListener('click',()=>{if(currentScene<SCENES.length-1)goToScene(currentScene+1,isPlaying);});
// Keyboard
document.addEventListener('keydown',e=>{if(e.key===' '){e.preventDefault();togglePlay();}if(e.key==='ArrowRight'){if(currentScene<SCENES.length-1)goToScene(currentScene+1,isPlaying);}if(e.key==='ArrowLeft'){if(currentScene>0)goToScene(currentScene-1,isPlaying);}if(e.key==='m')Speech.toggle();});
// Voice modal
const voiceModal=document.getElementById('voice-modal');
document.getElementById('btn-voice').addEventListener('click',e=>{e.stopPropagation();voiceModal.classList.toggle('open');});
document.addEventListener('click',e=>{if(!voiceModal.contains(e.target)&&e.target.id!=='btn-voice')voiceModal.classList.remove('open');});
document.getElementById('voice-select').addEventListener('change',e=>Speech.setVoice(e.target.value));
document.getElementById('rate-slider').addEventListener('input',e=>{Speech.rate=parseFloat(e.target.value);document.getElementById('rate-val').textContent=Speech.rate.toFixed(2)+'×';});
document.getElementById('pitch-slider').addEventListener('input',e=>{Speech.pitch=parseFloat(e.target.value);document.getElementById('pitch-val').textContent=Speech.pitch.toFixed(2);});
document.getElementById('vol-slider').addEventListener('input',e=>{Speech.vol=parseFloat(e.target.value);document.getElementById('vol-val').textContent=Math.round(Speech.vol*100)+'%';});
document.getElementById('btn-test-voice').addEventListener('click',()=>Speech.speak('This is the selected voice for the quantum anomaly detection explainer.'));
document.getElementById('btn-voice').addEventListener('dblclick',e=>{e.stopPropagation();Speech.toggle();});
// iOS
document.getElementById('btn-ios-start').addEventListener('click',()=>{iosUnlocked=true;document.getElementById('ios-unlock').classList.remove('show');const silent=new SpeechSynthesisUtterance(' ');silent.volume=0;silent.rate=10;window.speechSynthesis.speak(silent);togglePlay();});
// Static render
function renderCurrent(){resizeCanvas();const scene=SCENES[currentScene];const sp=Math.min(elapsedInScene/scene.duration,1);scene.canvasRender(ctx,W,H,sp);showEquations(scene,sp);updateProgress(totalUpTo(currentScene)+elapsedInScene);}
window.addEventListener('resize',()=>{if(!isPlaying)renderCurrent();});
document.addEventListener('visibilitychange',()=>{if(document.hidden){if(isPlaying)Speech.pause();}else{if(isPlaying)Speech.resume();}});

Speech.init();buildMarkers();goToScene(0,false);resizeCanvas();SCENES[0].canvasRender(ctx,W,H,0);document.getElementById('narration-text').textContent=NARRATIONS[0];
if(/iPhone|iPad|iPod/.test(navigator.userAgent))document.getElementById('ios-unlock').classList.add('show');
