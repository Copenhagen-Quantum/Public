  {id:3,stage:1,stageName:'Problem',title:'Qubit Access: Today\'s Landscape',subtitle:'Hardware availability, cloud access, and cost',duration:44,
   eqs:[{latex:'n^*(\\rho{=}0.035)\\approx 20\\;\\ll\\;156\\;\\text{(IBM Heron r2, 2024)}',label:'Key fact'}],
   canvasRender:canvasQubits,
   interp:`<p>The n*≈20 threshold is already exceeded by multiple commercially available systems today. IBM Heron r2 provides 156 physical qubits and is accessible via <em>quantum.ibm.com</em> — a free tier (10 minutes/month) or paid plan covers the ZZ circuit at n=20.</p>
   <p><strong>Cloud access routes:</strong> IBM Quantum (Heron r2, Eagle, Condor), AWS Braket (IonQ Forte, D-Wave Advantage 2), Azure Quantum (IonQ, Quantinuum). No on-premise hardware is required for the simulation or near-term deployment phases.</p>
   <p><strong>Cost:</strong> IBM charges per second of quantum time. A single QAD batch of 100,000 transactions uses approximately 0.4 seconds of Heron time for the ZZ kernel (n=20, 190 CX gates × 100k shots). At IBM's cloud pricing, this is well under €10 per batch.</p>
   <div class="insight lit">The barrier to quantum fraud detection is no longer hardware access — it is error mitigation and integration engineering.</div>`},

  {id:4,stage:2,stageName:'Lifecycle',title:'The Three-Phase Lifecycle',subtitle:'Cold start to calibrated production',duration:34,
   eqs:[{latex:'\\mathcal{L}=\\emptyset\\;\\Rightarrow\\;\\text{Phase 1}\\;\\to\\;|\\mathcal{L}|\\geq L_{\\min}\\;\\Rightarrow\\;\\text{Phase 2}',label:'Lifecycle'}],
   canvasRender:canvasLifecycle,
   interp:`<p><strong>Phase 1 (Cold Start):</strong> no labels. The quantum pipeline runs fully unsupervised, surfacing candidates for human review. Every confirmed case seeds the label set.</p><p><strong>Phase 2 (Warm-Up):</strong> once L<sub>min</sub> ≈ 430 confirmed fraud labels accumulate (≈2 days at 100k txns/day), the calibration layer activates. The quantum detection stage is unchanged.</p><p><strong>Phase 3 (Operational):</strong> labels grow continuously; calibration layer refreshed monthly.</p><div class="insight lit">The quantum stage never changes. The lifecycle adds interpretability on top of it.</div>`},

  {id:5,stage:2,stageName:'Lifecycle',title:'The Calibration Layer',subtitle:'From score to fraud probability',duration:32,
   eqs:[{latex:'P(\\text{fraud}\\mid S_C)=\\sigma(\\hat\\alpha S_C+\\hat\\beta)=\\frac{1}{1+e^{-\\hat\\alpha S_C-\\hat\\beta}}',label:'Def 4.2'}],
   canvasRender:canvasCalibration,
   interp:`<p>The calibration layer converts the quantum fused score S<sub>C</sub> ∈ [0,1] into a fraud probability. Without it, the score is a rank. With it, a fraud operations team can block transactions with P(fraud|S<sub>C</sub>) &gt; τ automatically.</p><p>The coefficient <strong>α̂</strong> is the discriminability index: how steeply fraud probability rises with the quantum score. A larger α̂ means the quantum pipeline is more discriminative.</p><div class="insight lit">Example: α̂=4.2, β̂=−3.1, S_C=0.73 → P(fraud)=72%. Expected fraud loss = 72% × transaction amount.</div>`},

  {id:6,stage:3,stageName:'Foundations',title:'Qubits and the Bloch Sphere',subtitle:'The fundamental quantum unit',duration:33,
   eqs:[{latex:'|\\psi\\rangle=\\alpha|0\\rangle+\\beta|1\\rangle,\\quad |\\alpha|^2+|\\beta|^2=1',label:'Qubit'}],
   canvasRender:canvasBloch,
   interp:`<p>A qubit can be 0, 1, or any superposition of both simultaneously. Before measurement, it carries a complex amplitude α for outcome 0 and β for outcome 1. The state space is the unit sphere S².</p><p>The <em>azimuthal angle φ</em> is the phase — invisible to single-shot measurement but crucial for interference between quantum states. This is exactly what the ZZ feature map encodes.</p><div class="insight lit">n qubits encode 2ⁿ complex amplitudes simultaneously. For n=6: 64 values. For n=20: over one million.</div>`},

  {id:7,stage:3,stageName:'Foundations',title:'Superposition and Hadamard',subtitle:'Creating parallel computation',duration:30,
   eqs:[{latex:'H^{\\otimes n}|0\\rangle^{\\otimes n}=\\frac{1}{\\sqrt{2^n}}\\sum_{k=0}^{2^n-1}|k\\rangle',label:'Eq. (5)'}],
   canvasRender:canvasHadamard,
   interp:`<p>The Hadamard gate H places a qubit in uniform superposition. Applied to all n qubits simultaneously, the system enters a uniform superposition over all 2ⁿ basis states — all combinations of features — in a single computational step.</p><p>For n=6: 64 basis states at once. Each state k represents a different combination of the ±1 spin values of the 6 features, encoding all pairwise interactions simultaneously.</p><div class="insight lit">This is the starting point for every quantum circuit in the QAD pipeline. Classical computation would need 64 sequential evaluations.</div>`},


  {id:8,stage:4,stageName:'ZZ Kernel',title:'Phase Encoding: Features Become Rotations',subtitle:'x ∈ [0,1]  →  φ = π·x  →  qubit azimuthal angle',duration:40,
   eqs:[{latex:'R_z(2\\varphi_q)|0\\rangle,\\quad \\varphi_q=\\pi x_q',label:'Single-qubit encoding'},
        {latex:'\\text{Low }x\\to\\text{small }\\varphi\\to|0\\rangle\\text{ regime}\\quad\\text{High }x\\to\\text{large }\\varphi\\to|1\\rangle\\text{ regime}',label:'Intuition'}],
   canvasRender:canvasPhaseEncoding,
   interp:`<p>Before any entanglement, each feature x<sub>q</sub> is encoded as a rotation angle φ<sub>q</sub>=π·x<sub>q</sub> on qubit q. The rotation R<sub>z</sub>(2φ) turns the qubit azimuthally on the Bloch sphere.</p>
   <p><strong>Amount=0.18</strong> → φ=0.57 rad → qubit near |0⟩ (typical transaction). <strong>Amount=0.88</strong> → φ=2.76 rad → qubit near |1⟩ (very high amount).</p>
   <p>This single-qubit encoding is fully classical — a feature lookup table. The quantum magic begins in the next step, when pairs of feature-encoded qubits are entangled via the ZZ gate, creating phase contributions that depend on <em>products</em> of feature values.</p>
   <div class="insight lit">Phase encoding is the bridge: continuous financial data enters as real numbers, leaves as quantum amplitudes distributed across 2<sup>n</sup> basis states.</div>`},

  {id:9,stage:4,stageName:'ZZ Kernel',title:'The Quantum Kernel Function K(x,x′)',subtitle:'Exponential feature space — free of the curse of dimensionality',duration:38,
   eqs:[{latex:'K(\\mathbf{x},\\mathbf{x}^\\prime)=|\\langle\\phi(\\mathbf{x})|\\phi(\\mathbf{x}^\\prime)\\rangle|^2\\in[0,1]',label:'Def. 5.3'},
        {latex:'\\text{Feature space dimension: }2^n\\quad(n{=}6\\Rightarrow 64,\\;n{=}20\\Rightarrow{>}10^6)',label:'Key fact'}],
   canvasRender:canvasKernelMatrix,
   interp:`<p>The quantum kernel K(x,x′) measures how similar two transactions are in a <strong>2<sup>n</sup>-dimensional feature space</strong> that no classical computer can explicitly construct. For n=6: 64 dimensions. For n=20: over one million.</p>
   <p>The kernel matrix (heatmap, left) shows clearly that normal transactions (rows 1–9) have high mutual overlap — their quantum fingerprints are similar — while fraud transactions (rows 10–12) have low overlap with normals, revealing themselves as outliers in Hilbert space.</p>
   <div class="insight lit">The kernel trick: you never need to store 2<sup>n</sup> coordinates. You only ever compute inner products between pairs of encoded states — and the quantum circuit does this in O(n²) gates.</div>`},

  {id:10,stage:4,stageName:'ZZ Kernel',title:'Building the Normal Population Mean State',subtitle:'1,000 normal transactions → one reference fingerprint |μ_φ⟩',duration:38,
   eqs:[{latex:'|\\mu_\\phi\\rangle=\\frac{1}{M}\\sum_{i=1}^{M}|\\phi(\\mathbf{x}_i)\\rangle,\\quad M\\approx 3{,}000',label:'Mean state'},
        {latex:'S_K(\\mathbf{x})=1-K(\\mathbf{x},\\mu_\\phi)=1-|\\langle\\phi(\\mathbf{x})|\\mu_\\phi\\rangle|^2',label:'Anomaly score'}],
   canvasRender:canvasMeanState,
   interp:`<p>The reference set of M≈3,000 recent transactions is encoded into quantum states and averaged to produce the <strong>normal population mean state |μ_φ⟩</strong>. This single vector in 2<sup>n</sup>-dimensional Hilbert space summarises the "normal fingerprint" of the network.</p>
   <p>In <strong>unsupervised mode</strong> (Phase 1), this reference set is a random sample — it contains ~ρ·M fraud transactions. These contaminate the mean state slightly, which is precisely what the pollution bound quantifies. In supervised mode (Phase 2+), only confirmed-normal transactions are used.</p>
   <div class="insight lit">Think of |μ_φ⟩ as a composite photograph of all normal transactions simultaneously. Any new transaction that "looks different" in quantum phase space scores near 1. Any that "blends in" scores near 0.</div>`},

  {id:11,stage:4,stageName:'ZZ Kernel',title:'The ZZ Entangling Gate',subtitle:'Data-adaptive feature interaction encoding',duration:35,
   eqs:[{latex:'ZZ(\\theta_{qr})=e^{-i\\theta_{qr}Z_q\\otimes Z_r},\\quad\\theta_{qr}=\\pi^2(1-x_q)(1-x_r)',label:'Eq. (9)'}],
   canvasRender:canvasZZCoupling,
   interp:`<p>The ZZ gate creates entanglement between qubits q and r with coupling angle θ<sub>qr</sub> that depends on the product of both feature values. The coupling is <strong>maximised at x=0</strong> (both features at their reference minimum) and vanishes at x=1.</p><p>Transactions with elevated features — high amounts, high velocity, large location deviations — generate minimal ZZ coupling. Their quantum fingerprints deviate strongly from the normal-transaction mean state.</p><div class="insight lit">This is the key data-adaptive property: no fixed-form classical kernel (RBF, polynomial, Matérn) has this feature-value-dependent coupling structure.</div>`},

  {id:12,stage:4,stageName:'ZZ Kernel',title:'64 Simultaneous Phasors',subtitle:'The ZZ amplitude structure',duration:33,
   eqs:[{latex:'\\langle k|\\phi(\\mathbf{x})\\rangle=\\frac{1}{\\sqrt{2^n}}e^{i\\Phi(k,\\mathbf{x})}',label:'Prop. 5.1'},
        {latex:'\\Phi(k,\\mathbf{x})=\\sum_q\\varphi_q\\sigma^z_q(k)+\\sum_{q<r}\\theta_{qr}\\sigma^z_q(k)\\sigma^z_r(k)',label:'Phase'}],
   canvasRender:canvasAmplitude,
   interp:`<p>For 8 features (n=8 qubits), the ZZ circuit produces 2⁸=256 simultaneous phasors — one per basis state — each encoding a distinct combination of features and their pairwise interactions.</p><p>All amplitudes have the same magnitude 1/√(2ⁿ) but different phases. The phase Φ(k,x) encodes all pairwise interactions between the features for the specific bit pattern of basis state k.</p><div class="insight lit">The proof is simple: all ZZ operators are diagonal in the computational basis, so they commute and their phases add.</div>`},

  {id:13,stage:4,stageName:'ZZ Kernel',title:'Quantum Interference as Detection',subtitle:'Constructive vs destructive interference',duration:35,
   eqs:[{latex:'S_K(\\mathbf{x})=1-|\\langle\\phi(\\mathbf{x})|\\mu_\\phi\\rangle|^2',label:'Def. 5.5'}],
   canvasRender:canvasInterference,
   interp:`<p>The kernel score measures quantum wave interference. For a <strong>normal transaction</strong> (left): phases are similar to the population mean state — products accumulate constructively, giving high overlap and S<sub>K</sub>≈0.</p><p>For a <strong>fraud transaction</strong> (right): phases are rotated differently — products cancel destructively, giving near-zero overlap and S<sub>K</sub>≈1.</p><div class="insight lit">This is not a distance metric. It is a physical phenomenon: the same mechanism by which light waves cancel in destructive interference. No classical kernel achieves this.</div>`},

  {id:14,stage:4,stageName:'ZZ Kernel',title:'Pre-Screening at 99.95th Percentile',subtitle:'100,000 transactions → 50 candidates',duration:30,
   eqs:[{latex:'\\mathcal{C}=\\{i:S_K(\\mathbf{x}_i)>\\text{Pct}_{99.95}(S_K)\\},\\quad|\\mathcal{C}|=50',label:'Eq. (24)'}],
   canvasRender:canvasKernelDist,
   interp:`<p>After computing S<sub>K</sub> for all 100,000 transactions, the 99.95th percentile threshold retains 50 candidates. The 99,950 eliminated transactions have been tested against the 2ⁿ-dimensional mean state and confirmed to interfere constructively — they look like the normal population in Hilbert space.</p><p>Sensitivity analysis (Appendix E) confirms this threshold is robust: AUC is flat above the 99.8th percentile.</p><div class="insight lit">The pre-screen is not just a computational shortcut — it is a meaningful quantum test with a clear physical interpretation.</div>`},


  {id:15,stage:4,stageName:'ZZ Kernel',title:'ZZ Kernel Qubit Checkpoint',subtitle:'n=6 qubits · 15 CX gates · 3% infidelity · CPU/QPU split',duration:42,
   eqs:[{latex:'n{=}6\\text{ qubits},\\;G(6){=}15\\text{ CX gates},\\;\\varepsilon_{\\rm acc}{\\approx}3\\%',label:'Pipeline A'},
        {latex:'\\text{CPU: normalise, pre/post-process}\\quad\\text{QPU: encode + measure overlap}',label:'Split'}],
   canvasRender:canvasZZQubitCheck,
   interp:`<p><strong>Qubit count: n=6 (Pipeline A), n=8 (Pipeline B).</strong> The ZZ feature map uses exactly n qubits — one per feature. No ancilla. No extra registers.</p>
   <p><strong>Gate count: n(n−1)/2.</strong> For n=6: 15 CX gates. For n=8: 28 CX gates. For the theoretical n*=20: 190 CX gates. Gate count, not qubit count, determines NISQ feasibility.</p>
   <p><strong>CPU does:</strong> feature normalisation, pre-sorting, threshold logic, post-ranking. <strong>QPU does:</strong> the R_z rotations and ZZ entangling gates, plus the overlap measurement ⟨φ(x)|μ_φ⟩.</p>
   <div class="insight lit">For Pipeline A (n=6): 15 CX gates at 0.2% error → 3% accumulated infidelity. ZNE is marginal — may not be needed. IBM Eagle (127 qubits, 2021) is sufficient hardware.</div>`},

  {id:16,stage:5,stageName:'Autoencoder',title:'Compression as Anomaly Detection',subtitle:'Normal transactions are compressible',duration:35,
   eqs:[{latex:'U_{\\text{enc}}(|\\phi(\\mathbf{x})\\rangle\\otimes|0\\rangle^{\\otimes(n-k)})=|\\psi_{\\text{trash}}\\rangle\\otimes|\\psi_{\\text{lat}}\\rangle',label:'Eq. (17)'}],
   canvasRender:canvasAutoencoder,
   interp:`<p>The quantum autoencoder compresses the 8-qubit input state into 3 latent qubits. For normal transactions, the reconstruction is nearly perfect — their quantum structure fits in 3 dimensions. For fraud, information is lost in the trash register.</p><p><strong>Why 3 latent qubits?</strong> A classical PCA on the same data retains 87% of variance in the top 3 principal components. The quantum bottleneck corresponds exactly to this dominant subspace.</p><div class="insight lit">The PCA surrogate used in simulation is the classical limit of the full quantum circuit — exact when the optimal compression is linear.</div>`},


  {id:17,stage:5,stageName:'Autoencoder',title:'Quantum State Fidelity and the SWAP Test',subtitle:'How we measure reconstruction quality on hardware',duration:38,
   eqs:[{latex:'F(|\\psi\\rangle,|\\phi\\rangle)=|\\langle\\psi|\\phi\\rangle|^2,\\quad P_{\\rm SWAP}(0)=\\tfrac{1}{2}(1+F)',label:'SWAP test'},
        {latex:'S_A(\\mathbf{x})=1-F(|\\psi_{\\rm decoded}\\rangle,|\\phi(\\mathbf{x})\\rangle)',label:'Anomaly score'}],
   canvasRender:canvasSWAPTest,
   interp:`<p>Fidelity F=|⟨ψ|φ⟩|² measures how close two quantum states are: F=1 means identical, F=0 means orthogonal. The autoencoder anomaly score is S<sub>A</sub>=1−F: how much the decoded state differs from the original.</p>
   <p>The <strong>SWAP test</strong> estimates F using one ancilla qubit and a controlled-SWAP gate. Measuring the ancilla in |0⟩ has probability ½(1+F), so F = 2·P(0)−1. This is the only way to compute quantum fidelity without full state tomography.</p>
   <p>In the classical simulation (PCA surrogate), fidelity is replaced by reconstruction variance: S<sub>A</sub>=‖x̃−x̂‖²/‖x̃‖². This is the classical limit of the SWAP-test result when the encoder is a linear unitary.</p>
   <div class="insight lit">The SWAP test is the measuring instrument of the quantum autoencoder. On real hardware, it requires n additional ancilla qubits — doubling the circuit size — but gives an exact fidelity estimate without state tomography.</div>`},

  {id:18,stage:5,stageName:'Autoencoder',title:'The Hardware Efficient Ansatz (HEA)',subtitle:'L=3 layers · 48 parameters · CNOT ladder entanglement',duration:40,
   eqs:[{latex:'U_{\\rm enc}(\\boldsymbol{\\theta})=\\prod_{\\ell=1}^{L}\\!\\left(U_{\\rm ent}\\prod_{j=1}^n R_y(\\theta_{\\ell,j})R_z(\\phi_{\\ell,j})\\right)',label:'Eq. (15)'},
        {latex:'L{=}3,\;n{=}8\;\Rightarrow\;2nL{=}48\;\text{variational parameters}',label:'Our setup'}],
   canvasRender:canvasHEA,
   interp:`<p>The encoder U<sub>enc</sub>(θ) is a <strong>Hardware Efficient Ansatz</strong>: L=3 repeated layers each consisting of (1) single-qubit Ry and Rz rotations with learnable angles, followed by (2) a fixed CNOT ladder across adjacent qubits to create entanglement.</p>
   <p>The HEA is "hardware efficient" because it only uses nearest-neighbour CX gates — matching IBM's native qubit connectivity — minimising routing overhead. The 48 parameters are enough to diagonalise the empirical covariance of an 8-feature dataset (verified empirically: validation loss plateaus at L=3).</p>
   <p>The decoder is the adjoint U<sup>†</sup><sub>enc</sub>: gate order reversed, rotation angles negated. Training freezes the encoder-decoder pair on normal transactions and never updates it during production.</p>
   <div class="insight lit">Each Ry gate costs one two-qubit interaction's worth of expressivity. Each CNOT creates entanglement between adjacent qubits. With 3 layers: the circuit can represent any unitary in the n-qubit group up to the expressivity constraint imposed by nearest-neighbour connectivity.</div>`},

  {id:19,stage:5,stageName:'Autoencoder',title:'Training: Minimising Trash Entropy',subtitle:'Parameter-shift rule · 200 steps · normal transactions only',duration:38,
   eqs:[{latex:'\\mathcal{L}(\\boldsymbol{\\theta})=1-\\mathbb{E}_{x\\sim P_{\\rm normal}}[F(|\\psi_{\\rm decoded}\\rangle,|\\phi(\\mathbf{x})\\rangle)]',label:'Training loss'},
        {latex:'\\frac{\\partial\\mathcal{L}}{\\partial\\theta_k}=\\tfrac{1}{2}\\bigl[\\mathcal{L}(\\theta_k+\\tfrac{\\pi}{2})-\\mathcal{L}(\\theta_k-\\tfrac{\\pi}{2})\\bigr]',label:'Parameter shift'}],
   canvasRender:canvasParameterShift,
   interp:`<p>The autoencoder is trained <em>only</em> on normal transactions to minimise average reconstruction infidelity. This is the key semi-supervised insight: we never need fraud labels to train the detector.</p>
   <p>The <strong>parameter-shift rule</strong> computes exact gradients using two forward passes per parameter (shift by ±π/2). No finite differences, no back-propagation through quantum gates. For 48 parameters: 96 circuit evaluations per gradient step.</p>
   <p>After ~200 steps, the encoder learns to project normal transaction quantum states onto the 3-qubit latent subspace with low infidelity (~8%). Fraud transactions, which lie outside this normal subspace, have infidelity ~65–75% — a clear separation.</p>
   <div class="insight lit">Training happens once, offline. In production the encoder runs forward only — no gradient computation — making the inference path efficient even on quantum hardware.</div>`},

  {id:20,stage:5,stageName:'Autoencoder',title:'Score Fusion and the QAD Funnel',subtitle:'Combining kernel and autoencoder signals',duration:30,
   eqs:[{latex:'S_C(\\mathbf{x})=\\text{clip}(0.55\\cdot S_K+0.45\\cdot S_A,\\;0,\\;1)',label:'Eq. (26)'}],
   canvasRender:canvasKernelDist,
   interp:`<p>S<sub>K</sub> detects Hilbert-space geometric deviation — globally unusual phase patterns across all 2ⁿ basis states. S<sub>A</sub> detects structural incompressibility — unusual co-variation patterns invisible to the kernel. Different fraud archetypes activate these criteria differently.</p><p>The weights (0.55/0.45) were selected by grid search over w<sub>K</sub>∈{0.50, 0.55, 0.60, 0.65, 0.70} maximising recall at a fixed 1% false-positive rate. All values in [0.50, 0.60] yield comparable recall (Δ≤0.01).</p><div class="insight lit">The funnel: 100,000 → 50 (kernel prescreen) → B ≤ 11 (QAOA diversity selection).</div>`},


  {id:21,stage:5,stageName:'Autoencoder',title:'Autoencoder Qubit Checkpoint',subtitle:'Simulation=0 qubits · Hardware=16 qubits · CPU/QPU split',duration:42,
   eqs:[{latex:'\\text{Simulation: }n_{\\rm qubits}{=}0\\;(\\text{PCA on CPU})',label:'Today'},
        {latex:'\\text{Hardware: }n_{\\rm data}{+}n_{\\rm ancilla}{=}8{+}8{=}16\\;\\text{qubits (SWAP test)}',label:'Near-term'}],
   canvasRender:canvasAEQubitCheck,
   interp:`<p>The autoencoder has <strong>two implementation paths</strong> that give equivalent results by design.</p>
   <p><strong>Simulation (today): 0 qubits.</strong> The PCA surrogate runs entirely on CPU. Input is standardised, projected onto 3 principal components, decoded, and scored. No quantum hardware needed. This is the classical limit of the quantum circuit.</p>
   <p><strong>Hardware (near-term): 16 qubits.</strong> 8 data qubits encode the input via the ZZ map, the HEA compresses to 3 latent qubits, and the SWAP test requires 8 additional ancilla qubits to measure reconstruction fidelity. Total: 16 physical qubits, 21 CX gates per inference.</p>
   <div class="insight lit">The simulation path is not an approximation — it is mathematically exact in the linear compression limit. The hardware path becomes advantageous when non-linear quantum correlations are needed, which may occur for very high-dimensional or non-Gaussian data.</div>`},

  {id:22,stage:6,stageName:'QAOA',title:'Diversity-Constrained Selection',subtitle:'Why top-B is not enough',duration:35,
   eqs:[{latex:'\\max_{\\mathbf{z}}\\sum_i S_C^{(i)}z_i-\\mu\\sum_{i<j}K_{ij}z_iz_j\\;\\text{s.t.}\\sum_iz_i=B',label:'Eq. (30)'}],
   canvasRender:canvasQAOADiversity,
   interp:`<p>Taking the top-B by score is suboptimal: multiple high-scoring candidates may represent <em>the same</em> fraud pattern — ten transactions from one card-cloning ring. The diversity penalty −μΣK<sub>ij</sub>z<sub>i</sub>z<sub>j</sub> penalises selecting two transactions with high quantum kernel similarity K<sub>ij</sub>.</p><p>Setting μ=0 recovers top-B. For μ=0.3, the problem is a genuine binary quadratic programme that cannot be solved by greedy selection.</p><div class="insight lit">QAOA uses quantum superposition to represent all 2,003 feasible configurations of 14 candidates simultaneously, and quantum tunnelling to escape local minima.</div>`},


  {id:23,stage:6,stageName:'QAOA',title:'From Selection Problem to Ising Hamiltonian',subtitle:'Every combinatorial problem can be encoded as quantum physics',duration:42,
   eqs:[{latex:'z_i\\in\\{0,1\\}\\xrightarrow{z_i=(1-\\sigma_i)/2}\\sigma_i\\in\\{-1,+1\\}',label:'Spin substitution'},
        {latex:'H_C=\\sum_i h_iZ_i+\\sum_{i<j}J_{ij}Z_iZ_j\\;\\Rightarrow\\;\\text{ground state}=\\text{optimal selection}',label:'Ising form'}],
   canvasRender:canvasIsingDerivation,
   interp:`<p>The binary selection problem is converted to a physics problem: minimise the energy of an Ising spin glass. Each candidate transaction becomes a spin (σ=−1: selected, σ=+1: excluded). The energy H<sub>C</sub> is lowest when the selected set maximises anomaly coverage and diversity.</p>
   <p>The coupling J<sub>ij</sub>=2λ−μK<sub>ij</sub>/4 encodes two competing forces: the cardinality penalty (2λ, keeps exactly B selected) and the diversity reward (−μK<sub>ij</sub>/4, penalises selecting similar candidates).</p>
   <div class="insight lit">This encoding is exact — no approximation. The optimal selection is literally the ground state of a physical system. QAOA prepares and measures that ground state.</div>`},

  {id:24,stage:6,stageName:'QAOA',title:'The Phase Separator: Scoring All Configurations',subtitle:'e^{−iγH_C} imprints the objective as a quantum phase',duration:38,
   eqs:[{latex:'U_C(\\gamma)=e^{-i\\gamma H_C}=\\prod_i e^{-i\\gamma h_i Z_i}\\prod_{i<j}e^{-i\\gamma J_{ij}Z_iZ_j}',label:'Phase separator'},
        {latex:'|\\mathbf{z}\\rangle\\to e^{-i\\gamma E(\\mathbf{z})}|\\mathbf{z}\\rangle\\quad\\text{each config gets its own phase}',label:'Effect'}],
   canvasRender:canvasPhaseSeparator,
   interp:`<p>The phase separator U<sub>C</sub>(γ) acts on the superposition of all 2<sup>14</sup>=16,384 configurations simultaneously. Each configuration |z⟩ acquires a phase e<sup>−iγE(z)</sup> proportional to its energy E(z) — its combined anomaly score and diversity.</p>
   <p>High-energy configurations (bad selections) get large phase shifts. Low-energy configurations (good, diverse selections) get small phase shifts. <em>Crucially, this does not yet change any measurement probabilities</em> — phases are invisible to direct measurement.</p>
   <p>The phase separator is implemented as a product of ZZ rotations (one per candidate pair, for the J<sub>ij</sub> terms) and Z rotations (one per candidate, for the h<sub>i</sub> terms). This is exactly the H<sub>C</sub> Hamiltonian acting in the computational basis.</p>
   <div class="insight lit">The phase separator is the quantum "scoring function" — it evaluates the objective on every configuration simultaneously in one circuit layer. A classical computer would need 3,003 sequential evaluations.</div>`},

  {id:25,stage:6,stageName:'QAOA',title:'The Mixer: Quantum Exploration',subtitle:'U_B(β) redistributes probability among configurations',duration:40,
   eqs:[{latex:'U_B(\\beta)=e^{-i\\beta\\sum_i X_i}=\\prod_i e^{-i\\beta X_i},\\quad X_i=\\hat{\\sigma}_i^x',label:'X-mixer'},
        {latex:'[H_C,\\textstyle\\sum_i X_i]\\neq 0\\;\\Rightarrow\\;\\text{quantum tunnelling between configurations}',label:'Non-commutativity'}],
   canvasRender:canvasMixer,
   interp:`<p>The mixer U<sub>B</sub>(β) applies X rotations (bit-flips) to each qubit. This mixes probability amplitudes between configurations that differ by a single spin — it "explores" the neighbourhood of the current superposition.</p>
   <p>The key property: <strong>H<sub>C</sub> and the mixer do not commute</strong>. This non-commutativity is what makes QAOA quantum rather than just a classical phase-encoding trick. It means the wavefunction can constructively interfere towards good configurations while destructively interfering away from bad ones — exactly as in the ZZ kernel's interference mechanism.</p>
   <p>Alternating p=3 layers of phase separator (score) and mixer (explore) is sufficient for near-optimal selection at C=14. The parameter-shift rule trains γ and β jointly.</p>
   <div class="insight lit">The mixer is why QAOA outperforms greedy top-B: it simultaneously considers all pairwise diversity penalties K<sub>ij</sub> while exploring alternative selections — something no sequential greedy algorithm can do.</div>`},

  {id:26,stage:6,stageName:'QAOA',title:'QAOA: Quantum Tunnelling to Global Minimum',subtitle:'Energy landscape and circuit structure',duration:35,
   eqs:[{latex:'H_C=\\sum_i h_iZ_i+\\sum_{i<j}J_{ij}Z_iZ_j,\\quad J_{ij}=2\\lambda-\\tfrac{\\mu}{4}K_{ij}',label:'Eq. (31–32)'}],
   canvasRender:canvasQAOALandscape,
   interp:`<p>The Ising Hamiltonian H<sub>C</sub> encodes both the financial objective (maximise anomaly scores) and the diversity penalty (avoid redundant selections). The coupling J<sub>ij</sub> now contains a data-dependent term K<sub>ij</sub> — this is what makes QAOA justified over greedy top-B.</p><p>Classical gradient descent can be trapped in a local minimum (red). QAOA's quantum wavefunction penetrates barriers via tunnelling, reaching the global minimum (green star) in 3 layers, 3 restarts, 14 gradient steps.</p><div class="insight lit">The cardinality penalty λ=3+B/C ensures the constraint ΣZ_i=B is enforced throughout the optimisation.</div>`},


  {id:27,stage:6,stageName:'QAOA',title:'QAOA Qubit Checkpoint',subtitle:'14 qubits · 273 CX gates (p=3) · ZNE essential',duration:42,
   eqs:[{latex:'n_{\\rm QAOA}{=}C{=}14\\;\\text{(candidates)},\\;G{=}\\tfrac{C(C-1)}{2}{\\times}p{=}273',label:'Circuit'},
        {latex:'\\varepsilon_{\\rm acc}{=}1{-}(0.998)^{273}{\\approx}42\\%\\;\\xrightarrow{\\rm ZNE}\\;O(\\varepsilon^3)',label:'After ZNE'}],
   canvasRender:canvasQAOAQubitCheck,
   interp:`<p><strong>Qubit count: C=14.</strong> Exactly one qubit per candidate transaction. No ancilla needed for QAOA itself (ancilla only required for the SWAP test in the autoencoder).</p>
   <p><strong>Gate count: 273 CX gates</strong> for p=3 layers. This is the most gate-intensive component. Raw infidelity of 42% means ZNE is essential, not optional. With m=3 ZNE levels, the residual error is ~O(ε³) ≈ 0.001% — well within AUC tolerance.</p>
   <p><strong>Classical workload is substantial:</strong> computing S_C for all 50 candidates, building the 14×14 K_ij similarity matrix, constructing H_C coefficients, running 3 random restarts, parsing measurement outcomes.</p>
   <div class="insight lit">QAOA needs the fewest qubits of the three methods (14 vs 16 for QAE vs 20 for ZZ kernel at n*), but has the most gates. IBM Heron r2 (156 qubits, 0.2% CX error) handles all three simultaneously.</div>`},

  {id:28,stage:7,stageName:'n*(ρ)',title:'The Pollution Bound',subtitle:'How contamination shifts the mean state',duration:34,
   eqs:[{latex:'\\|\\mu_{\\text{sup}}-\\mu_{\\text{unsup}}\\|\\leq\\frac{2\\rho C/c}{1-\\rho}\\sqrt{1+C_0e^{-\\kappa n}}',label:'Lemma 9.1'}],
   canvasRender:canvasPollution,
   interp:`<p>When the reference set contains fraud (contamination rate ρ), the unsupervised mean state drifts from the supervised mean state. The Pollution Bound quantifies this drift.</p><p><strong>Pipeline A</strong> (engineered features): ‖μ<sub>sup</sub>−μ<sub>unsup</sub>‖=0.448 — small, because engineered features cleanly separate fraud and normal in ZZ-encoded space. <strong>Pipeline B</strong> (raw fields): 1.318 — larger, because uninformative features dilute the signal.</p><div class="insight lit">The bound shrinks exponentially as n grows. This is the mathematical foundation for the n*(ρ) theorem.</div>`},

  {id:29,stage:7,stageName:'n*(ρ)',title:'The n*(ρ) Crossing Theorem',subtitle:'When unsupervised matches supervised',duration:38,
   eqs:[{latex:'n^*(\\rho)=\\left\\lceil\\frac{1}{\\kappa}\\ln\\frac{C_0}{\\rho d}\\right\\rceil',label:'Corollary 9.4'},
        {latex:'\\kappa=0.12,\\;\\rho=0.035,\\;d=8\\;\\Rightarrow\\;n^*\\approx 20',label:'Numerical'}],
   canvasRender:canvasNstar,
   interp:`<p>The theorem proves that for any contamination rate ρ and feature dimension d, there exists a qubit count n*(ρ) above which the unsupervised pipeline achieves AUC within ε of the supervised pipeline.</p><p>As n increases, the ZZ kernel separates fraud and normal quantum states exponentially well. Once n≥n*, even a contaminated reference set produces near-supervised AUC.</p><div class="insight lit">For ρ=0.035, d=8, κ=0.12: n*≈20. IBM Heron r2 has 156 physical qubits — n* is exceeded today. This is a necessary but not sufficient condition: error mitigation is also required.</div>`},

  {id:30,stage:7,stageName:'n*(ρ)',title:'Why n*=20 Still Needs Error Mitigation',subtitle:'Qubit count vs gate count — the hidden cost',duration:44,
   eqs:[{latex:'G(n)=\\frac{n(n-1)}{2}\\;\\text{CX gates},\\quad\\varepsilon_{\\rm acc}=1-(1-\\varepsilon_g)^{G(n)}',label:'Gate scaling'},
        {latex:'n=20\\Rightarrow G=190,\\;\\varepsilon_g=0.2\\%\\Rightarrow\\varepsilon_{\\rm acc}\\approx 31\\%',label:'Heron r2'}],
   canvasRender:canvasErrorMitigation,
   interp:`<p>A natural question: if n*≈20 is small and IBM Heron r2 has 156 qubits, why is error mitigation still <em>necessary</em>? Because <strong>n* counts qubits, not gates</strong>.</p>
   <p>The ZZ feature map for n=20 uses <strong>n(n-1)/2 = 190 two-qubit CX gates</strong>. At 0.2% error per gate (Heron r2), this gives <strong>~31% accumulated infidelity</strong> — before a single measurement. This compresses the kernel score variance towards the random-state baseline 2<sup>−n</sup>, degrading the AUC.</p>
   <p><strong>ZNE</strong> runs the circuit at λ=1×, 2×, 3× amplified noise (by gate stretching), measures the kernel expectation at each level, then Richardson-extrapolates to λ=0. With m=3 levels, residual error is O(ε³) — well within AUC tolerance for n≤20.</p>
   <div class="insight lit">Gate-depth budget, not qubit count, is the binding NISQ constraint. n*=20 is the destination; ZNE is the bridge to get there.</div>`},

  {id:31,stage:7,stageName:'n*(ρ)',title:'Experimental Results and Hardware Readiness',subtitle:'AUC 0.737 vs classical baseline 0.621',duration:36,
   eqs:[{latex:'\\text{AUC}_{\\text{QAD}}=0.737\\pm 0.007\\quad\\text{vs}\\quad\\text{AUC}_{\\text{IF}}=0.621\\pm 0.015',label:'Table 2'}],
   canvasRender:canvasHardware,
   interp:`<p>Across 30 runs, the full QAD pipeline (Pipeline A, unsupervised) achieves AUC 0.737±0.007, versus Isolation Forest 0.621±0.015, LOF 0.598±0.018, and one-class SVM 0.643±0.012. All differences are statistically significant (p&lt;0.001).</p><p>The hardware readiness stack distinguishes three tiers: simulation today (exact, n≤20), near-term on IBM Heron r2 with Zero-Noise Extrapolation, and fault-tolerant hardware enabling the full theoretical AUC for any contamination rate.</p><div class="insight lit">To our knowledge, this is the first framework to combine a quantum kernel, quantum autoencoder, and QAOA with a proven lifecycle model and closed-form hardware milestone.</div>`},


  {id:32,stage:7,stageName:'n*(ρ)',title:'Full-System Feasibility Study',subtitle:'Every qubit, every gate, every euro — per 100k transaction batch',duration:50,
   eqs:[{latex:'\\text{Total}:\;n{\leq}50\;\text{qubits},\;G{\leq}484\;\text{CX gates},\;<€27\;\text{per batch}',label:'Full pipeline'},
        {latex:'\\text{IBM Heron r2: }156\;\text{qubits}\;\gg 50\;\Rightarrow\;\text{all three methods run simultaneously}',label:'Hardware margin'}],
   canvasRender:canvasFeasibility,
   interp:`<p>Running all three methods simultaneously on IBM Heron r2: ZZ kernel (n=20, 190 gates) + QAE (n=16, 21 gates) + QAOA (C=14, 273 gates) = <strong>50 qubits and 484 CX gates total</strong>. IBM Heron r2 provides 156 qubits — a 3× margin.</p>
   <p><strong>Cost: under €27 per batch of 100,000 transactions</strong>, based on IBM's cloud pricing at approximately €0.025 per QPU-second. This is competitive with high-end classical anomaly detection infrastructure.</p>
   <p>The deployment timeline: simulation today (AUC 0.737, CPU only), NISQ pilot in 2025–2026 (ZZ kernel on QPU with ZNE), full hybrid in 2026–2027 (all three methods on QPU), fault-tolerant post-2030 (no ZNE, full theoretical AUC for any contamination rate).</p>
   <div class="insight lit">The binding constraint is not qubit count — IBM already has enough. It is error mitigation engineering, software integration, and QPU latency (seconds today vs microseconds needed for real-time blocking).</div>`},

  {id:33,stage:7,stageName:'n*(ρ)',title:'Summary: The QAD Lifecycle',subtitle:'From cold start to fraud probability',duration:38,
   eqs:[{latex:'S_C\\xrightarrow{\\text{Phase 1}}\\mathcal{F}\\xrightarrow{\\text{Phase 2}}P(\\text{fraud}|S_C)\\xrightarrow{\\text{Phase 3}}\\hat{p}_i\\cdot\\text{amount}',label:'Lifecycle'}],
   canvasRender:canvasPipelineSummary,
   interp:`<p>The QAD pipeline provides a complete answer to the fraud detection problem: no labels required at start, quantum interference detects novel fraud patterns, the diversity selection avoids redundant flags, and the calibration layer converts quantum scores to business-actionable fraud probabilities.</p><p>The n*(ρ) theorem provides the quantitative roadmap: at n=20 qubits (already available), the label-free quantum pipeline matches supervised accuracy for typical payment-network contamination rates.</p><div class="insight lit">For questions about this framework, contact Tim Bruun Madsen — Founder of Copenhagen Quantum and PhD fellow in quantum finance.</div>`},
];

// ═══════════════════════════════════════════════════════

const NARRATIONS=[
  // 0
  `Welcome to this narrated explainer of Quantum Anomaly Detection in Financial Transaction Networks. I am Tim Bruun Madsen, Founder and CEO of Copenhagen Quantum, and a PhD fellow in quantum finance. This presentation covers the mathematical framework behind the QAD lifecycle: how three quantum methods — a ZZ-feature-map kernel, a quantum autoencoder, and the Quantum Approximate Optimisation Algorithm — combine to detect fraud in financial networks without requiring labelled data. The central theoretical result is the n-star theorem: a rigorous proof that there exists a qubit count above which the label-free quantum pipeline is as accurate as a fully supervised system.`,
  // 1
  `Fraud detection in payment networks faces three structural problems that classical supervised machine learning cannot simultaneously resolve. First, label delay: fraud confirmations arrive through chargebacks, and only forty-two percent of labels are available within seven days. A model retrained monthly is trained on a biased, incomplete picture. Second, class imbalance: with only zero-point-three-five percent fraud prevalence, a model predicting normal on every transaction achieves ninety-nine-point-six-five percent accuracy. Area under the ROC curve is the only meaningful performance metric. Third, concept drift: fraud tactics evolve continuously. A supervised model trained on known archetypes will never flag a genuinely new pattern by construction. The quantum approach resolves all three: it requires no labels, is sensitive to rare events through its interference mechanism, and detects novelty by definition.`,
  // 2
  `The experiment is designed as a two-by-two factorial: we cross supervision against pipeline. The supervision dimension tests whether the reference set used to build the normal population mean state uses confirmed-normal transactions only — that is the supervised mode — or a random sample from the full transaction pool, which includes fraud at the natural prevalence rate. That is the unsupervised mode. The pipeline dimension tests two different approaches to feature encoding. Pipeline A uses eight carefully engineered features on six qubits. The features are constructed from domain expertise: transaction amount normalised by account history, velocity computed over a rolling window, a location deviation score derived from the cardholder's habitual geography, and so on. These features are designed to separate fraud from normal before the quantum circuit even runs. Pipeline B uses twelve raw transaction fields on eight qubits: raw currency codes, raw terminal identifiers, raw latitude and longitude coordinates. No prior signal compression. The ZZ kernel must discover the relevant structure from scratch. Pipeline A wins decisively: AUC zero-point-seven-three-seven against zero-point-five-four-two in unsupervised mode. The lesson is direct: domain expertise in feature engineering translates to smaller pollution bounds, lower contamination sensitivity, and a better n-star threshold. Quantum computing amplifies good features — it does not replace the need to think carefully about what you encode.`,

  // 3
  `The n-star threshold of approximately twenty qubits is already exceeded by multiple commercially available systems. IBM Heron r2, released in late 2024, provides one-hundred-and-fifty-six physical qubits and is accessible through quantum.ibm.com. A free tier provides ten minutes of quantum time per month, which is more than sufficient for the ZZ-kernel pre-screen on a batch of one-hundred-thousand transactions. Paid plans remove that cap. Beyond IBM, AWS Braket gives pay-per-shot access to IonQ Forte and D-Wave Advantage 2 systems — no subscription required, you pay only for what you run. Azure Quantum offers similar access to IonQ and Quantinuum processors, with free credits available for new accounts. For IonQ Forte with thirty-six algorithmic qubits, the n-star threshold is marginally exceeded, but the gate fidelity is higher than superconducting systems, meaning less error mitigation overhead. D-Wave Advantage 2 with seven-thousand qubits operates on a different paradigm — quantum annealing rather than gate-based computing — and is better suited to the QAOA selection stage than the ZZ kernel stage. The cost question is practical: a single QAD batch of one-hundred-thousand transactions uses approximately zero-point-four seconds of Heron time for the ZZ kernel at n equals twenty, with one-hundred-and-ninety CX gates per circuit and the necessary shots. At IBM cloud pricing, this amounts to well under ten euros per batch. The hardware barrier to quantum fraud detection has largely fallen. The remaining barriers are error mitigation engineering, integration with existing transaction processing infrastructure, and latency — the current round-trip time to IBM cloud is measured in seconds, which is sufficient for batch scoring but not yet for real-time transaction blocking at the microsecond level.`,

  // 4
  `The lifecycle framework resolves the tension between unsupervised detection and operational interpretability by recognising that the two regimes are temporally sequential. Phase one is the cold start: no labels are available. The quantum pipeline runs fully unsupervised, surfacing candidates for human review. Every confirmed case seeds the label set. Phase two is the warm-up: once approximately four-hundred-and-thirty confirmed fraud labels have accumulated — which takes roughly two days at a network processing one-hundred-thousand transactions per day — a logistic calibration layer is trained. The quantum detection stage is unchanged throughout all three phases. Phase three is operational: labels grow continuously and the calibration layer is refreshed monthly. The lifecycle key insight is that the quantum kernel, autoencoder, and QAOA run identically from day one.`,
  // 5
  `The calibration layer solves the fundamental operational problem of unsupervised detection: the quantum fused score S-C is a rank, not a probability. A fraud operations team needs to know whether S-C equal to zero-point-seven-three means a ten percent or seventy percent probability of fraud. The logistic calibration layer estimates P of fraud given S-C equals sigma of alpha times S-C plus beta, where sigma is the sigmoid function and alpha and beta are estimated by maximum likelihood from the accumulated label set. The coefficient alpha is the discriminability index: how steeply fraud probability rises with the quantum score. A worked example: with alpha equal to four-point-two and beta equal to minus three-point-one, a transaction scoring zero-point-seven-three has a seventy-two percent probability of fraud. Expected fraud loss is seventy-two percent times the transaction amount.`,
  // 6
  `The Bloch sphere provides the geometric picture for a single qubit. Unlike a classical bit which is either zero or one, a qubit can be in any superposition: alpha times ket-zero plus beta times ket-one, where the complex amplitudes alpha and beta satisfy the normalisation condition. The state space is the unit sphere: the north pole represents ket-zero, the south pole represents ket-one, and the equator contains equal superpositions. The azimuthal angle phi is the phase — invisible to single-shot measurement, but crucial for quantum interference between different states. The ZZ feature map uses the phase as its encoding medium: it rotates each qubit azimuthally by an angle proportional to the corresponding feature value. The phase difference between a transaction's encoded state and the normal population mean state is the anomaly signal.`,
  // 7
  `The Hadamard gate creates superposition by mapping ket-zero to a uniform superposition of ket-zero and ket-one. Applied to all n qubits simultaneously, it creates a uniform superposition over all two-to-the-n basis states. For n equal to six, that is sixty-four basis states simultaneously. Each basis state k represents a different combination of plus-one and minus-one spin values for the six features, and therefore encodes a different combination of feature interactions. This is the starting point for every quantum circuit in the QAD pipeline. A classical computer would need to evaluate sixty-four configurations sequentially. The quantum circuit processes all sixty-four in a single pass, with each configuration contributing to the final quantum amplitude through interference.`,
  // 8
  `Before the ZZ entangling gate can create quantum interactions between features, each individual feature must first be encoded onto a single qubit. This step is deceptively simple: take a normalised feature value x between zero and one, multiply by pi, and use the result as a rotation angle to spin the qubit on the Bloch sphere. For a transaction amount normalised to zero-point-one-eight — a fairly typical small purchase — the rotation angle is zero-point-five-seven radians, keeping the qubit close to the ket-zero north pole. For a very large transaction normalised to zero-point-eight-eight, the rotation is two-point-seven-six radians, swinging the qubit most of the way toward ket-one. The azimuthal phase angle carries the encoded information — it is invisible to any single-qubit measurement, but it becomes the raw material for the ZZ entangling gate, which will multiply these phases together across all feature pairs. Think of it this way: each feature becomes a unique orientation of a quantum compass needle. When eight such needles are simultaneously oriented and then entangled, the resulting quantum state carries all forty-two pairwise interaction combinations — the amount-times-velocity coupling, the location-times-hour coupling, and so on — encoded simultaneously in the phases of sixty-four basis-state amplitudes. This is the foundation of the ZZ feature map's discriminative power.`,

  // 9
  `The quantum kernel K of x and x-prime is defined as the squared overlap — the squared inner product — between the two encoded quantum states. This single number between zero and one answers the question: how similar are these two transactions in quantum feature space? When the kernel value is close to one, the two transactions have nearly identical quantum fingerprints — the same combination of feature values and pairwise interactions is encoded in their phases. When it is close to zero, the two states are nearly orthogonal in the two-to-the-n-dimensional Hilbert space — they represent transactions so different that their encoded amplitudes cancel almost completely. The kernel matrix visualises this for a small set of transactions: the top-left block of high-overlap pairs are normal transactions — they form a tight cluster in Hilbert space. The bottom-right fraud entries show low overlap with normals — they are outliers in this high-dimensional space. The power of the quantum kernel is that this two-to-the-n-dimensional feature space never needs to be explicitly constructed. The kernel is computed as a single complex inner product between two quantum states, each requiring only n qubits to represent. This is the quantum analogue of the kernel trick in classical support vector machines: compute a high-dimensional similarity without ever building the high-dimensional representation.`,

  // 10
  `To detect anomalies, the system needs a reference fingerprint — a quantum state that summarises what normal transactions look like. This is the normal population mean state, constructed by encoding approximately three-thousand recent transactions and averaging their quantum states. Each reference transaction contributes one unit vector in two-to-the-n-dimensional Hilbert space. The average of these vectors gives a vector pointing toward the centre of the normal transaction cluster in that space. In unsupervised mode during Phase One of the lifecycle, this reference set is a random sample of all transactions, which means approximately rho times three-thousand of the reference transactions are actually fraud. These contaminate the mean state slightly — the mean state drifts away from the true all-normal reference. This drift is precisely what the pollution bound lemma quantifies: the contaminated mean state is at most two-rho-C divided by c times one minus rho times the square root of one plus C-naught-e-to-the-minus-kappa-n away from the ideal supervised mean state. The key insight: this drift shrinks exponentially as the qubit count n grows. More qubits means better separation of fraud from normal quantum states, which means even a contaminated reference set yields a mean state close to the ideal. This is the mathematical engine behind the n-star theorem.`,

  // 11
  `The ZZ entangling gate is the key building block of the ZZ feature map. It applies a phase rotation of theta-qr between qubits q and r, where theta-qr equals pi-squared times one minus x-q times one minus x-r. The crucial property is that the coupling is maximised when both features are at their minimum value zero, giving theta equal to pi-squared, approximately nine-point-eight-seven, and vanishes when either feature reaches its maximum value one. This means transactions with elevated features — high transaction amounts, high velocity, large location deviations — generate minimal ZZ coupling between qubits. Their encoded quantum states therefore accumulate phase patterns that deviate strongly from the normal-transaction mean state, producing a strong anomaly signal. No classical kernel has this feature-value-dependent coupling structure.`,
  // 12
  `For eight features encoded in eight qubits, the ZZ feature map produces two-to-the-eighth power, that is two-hundred-and-fifty-six, simultaneous phasors — one per basis state. Each phasor has the same amplitude of one divided by the square root of two-to-the-n, but a different phase that encodes a distinct combination of features and their pairwise interactions. The proof is elementary: all ZZ operators are simultaneously diagonal in the computational basis, so they commute, and their phases add. The total phase for basis state k is the sum of linear feature contributions plus the sum of pairwise ZZ coupling contributions across all feature pairs. This is the information-theoretic miracle of the ZZ kernel: it encodes all pairwise feature interactions simultaneously in a circuit of depth O-of-n-squared, while classical computation would require O-of-n-squared times two-to-the-n.`,
  // 13
  `The kernel anomaly score is one minus the squared overlap between the transaction's encoded quantum state and the population mean state. For a normal transaction, the phases are similar to those of the mean state: amplitude products accumulate constructively across most basis states, giving high overlap and a score near zero. For a fraud transaction, the phases are rotated differently: amplitude products cancel destructively, giving near-zero overlap and a score near one. This is quantum wave interference applied to anomaly detection. The same physical phenomenon that causes destructive interference in light waves — where two waves cancel each other when they are out of phase — is here used to distinguish fraud from normal transaction patterns. This is qualitatively different from any classical distance or density-based criterion.`,
  // 14
  `After kernel-scoring all one-hundred-thousand transactions, the system retains the top fifty — those above the ninety-nine-point-nine-five percentile. The ninety-nine-thousand-nine-hundred-and-fifty eliminated transactions have been tested against the two-to-the-n-dimensional mean state and found to interfere constructively. This is not just a computational shortcut: it is a meaningful quantum test with a clear physical interpretation. Each eliminated transaction has been confirmed to have a quantum fingerprint consistent with the normal population in Hilbert space. Sensitivity analysis across percentile thresholds confirms this choice is robust: AUC is flat above the ninety-ninth-point-eight percentile, meaning any threshold in that range yields the same performance.`,
  // 15
  `Before we move on from the ZZ kernel, let us be precise about exactly what hardware and computation it requires. The ZZ kernel for Pipeline A uses six qubits — one per engineered feature. The circuit depth is n times n minus one divided by two CX gates, which for n equals six gives fifteen two-qubit gates. On IBM Heron r2, each CX gate has a 0.2 percent error rate. Fifteen gates at 0.2 percent per gate gives an accumulated infidelity of approximately three percent. That is low enough that Zero-Noise Extrapolation is only marginal — it may not even be necessary for Pipeline A. For Pipeline B with n equals eight, the gate count rises to twenty-eight, and infidelity to five percent. ZNE is advisable. For the theoretical n-star equals twenty case, we have one-hundred-and-ninety gates and thirty-one percent infidelity — ZNE is essential. Now, what runs on the CPU versus the QPU? The CPU handles everything before the quantum circuit: it normalises features to the zero-one range, computes the phase angles phi-q equals pi times x-q as a simple lookup, maintains the reference set of three-thousand transactions, and accumulates the mean state by averaging encoded vectors. The CPU also handles everything after: sorting kernel scores, applying the ninety-ninth-point-nine-five percentile threshold, and routing the fifty candidates to the autoencoder. The QPU handles only the quantum core: applying the R-z single-qubit rotations and the ZZ two-qubit entangling gates, then measuring the overlap between the encoded transaction state and the mean state. ZZ kernel verdict: six qubits, fifteen CX gates, three percent infidelity, marginal ZNE, feasible on IBM Eagle which has been available since two-thousand-and-twenty-one.`,

  // 16
  `The quantum autoencoder tests whether each candidate transaction's quantum state can be faithfully compressed into a three-qubit latent bottleneck. Normal transactions are compressible: their quantum structure lies close to the subspace spanned by the three dominant modes of the normal population. Fraud transactions are not: their quantum structure contains information in directions orthogonal to this normal subspace, which is irretrievably lost during compression. The degree of information loss — measured as reconstruction infidelity — is the anomaly score S-A. The choice of three latent qubits corresponds to the top three principal components in a classical PCA, which retain eighty-seven percent of variance in the engineered-feature dataset. The PCA surrogate used in simulation is the classical limit of the full quantum circuit.`,
  // 17
  `Fidelity is the fundamental measure of quantum similarity: how close is one quantum state to another? The fidelity F between two states ket-psi and ket-phi is the squared absolute value of their inner product, ranging from zero — completely orthogonal — to one — identical states. For the quantum autoencoder, fidelity measures how well the encoder-decoder chain reconstructs the original input. F close to one means the autoencoder successfully compressed and decompressed the state — a normal transaction. F close to zero means significant quantum information was lost during compression — an anomalous transaction. The practical challenge: how do you measure fidelity between two quantum states without performing full state tomography, which requires exponentially many measurements? The answer is the SWAP test, a circuit invented by Buhrman and colleagues in two-thousand-and-one. Prepare one ancilla qubit in the superposition created by a Hadamard gate, then apply a controlled-SWAP gate that swaps the two states conditioned on the ancilla being in ket-one, then measure the ancilla. The probability of measuring ket-zero is exactly one-half times one plus F. Two forward passes through the circuit give an estimate of F to any desired precision. On IBM hardware, the SWAP test doubles the qubit count — eight input qubits become sixteen — but the measurement is exact and requires no full state reconstruction.`,

  // 18
  `The quantum autoencoder's encoder is a Hardware Efficient Ansatz: a parameterised circuit architecture designed to be implementable on real quantum processors with minimal overhead. The term hardware-efficient means the circuit uses only operations that the target hardware can execute natively — in IBM's case, single-qubit rotations and nearest-neighbour two-qubit CX gates — rather than requiring expensive SWAP networks to move quantum information between non-adjacent qubits. The architecture is three layers deep. Each layer applies single-qubit Ry rotations with learnable angles theta-ell-j followed by single-qubit Rz rotations with learnable angles phi-ell-j to every qubit. Then a fixed ladder of CNOT gates entangles adjacent qubits, creating the quantum correlations needed to diagonalise the covariance structure of the data. For eight qubits and three layers, this gives two times eight times three equals forty-eight variational parameters. This is sufficient because the dominant compression we need — projecting onto the top-three principal components — requires diagonalising an eight-by-eight matrix, which has at most twenty-eight independent parameters. The CNOT ladder creates exactly the necessary entanglement structure. The latent register is the first three qubits; the trash register is the remaining five. After training, the trash register of normal transactions contains almost pure vacuum — ket-zero tensor product five times — while the trash register of anomalous transactions holds significant quantum information. The anomaly score is the fidelity of the trash register with ket-zero.`,

  // 19
  `Training the quantum autoencoder means finding the forty-eight variational parameters that minimise average reconstruction infidelity on normal transactions. The training data contains only confirmed-normal transactions — no fraud labels are needed. The optimisation uses the parameter-shift rule: to compute the gradient with respect to parameter theta-k, run the circuit twice, once with theta-k shifted by plus pi-over-two and once with minus pi-over-two. The gradient is exactly one-half times the difference of the two loss values. This is not an approximation — it is an exact analytical gradient, derived from the fact that quantum gate parameters appear inside trigonometric functions with a specific derivative structure. For forty-eight parameters, each gradient step requires ninety-six circuit evaluations. After approximately two-hundred gradient steps, the loss converges to approximately eight percent infidelity on normal transactions. The same encoder applied to fraud transactions gives infidelity of sixty-five to seventy-five percent — a clear separation. In the classical PCA surrogate used in our experiments, training is instantaneous: it is simply a singular value decomposition of the data matrix. The PCA surrogate is the classical limit of the hardware circuit when the optimal compression is linear, which is an excellent approximation for our eight engineered features. The key operational property: training happens once, offline, on historical data. In production the encoder runs forward only, with no gradient computation required.`,

  // 20
  `The fused score S-C combines the kernel score S-K and the autoencoder score S-A with weights zero-point-five-five and zero-point-four-five respectively. These two scores detect different aspects of anomaly: S-K detects Hilbert-space geometric deviation — globally unusual phase patterns across all two-to-the-n basis states — while S-A detects structural incompressibility — unusual co-variation patterns invisible to the kernel. Different fraud archetypes activate these criteria differently, and combining both improves recall. The fusion weights were selected by grid search on a held-out validation set. All weights in the range zero-point-five to zero-point-six yield comparable recall, confirming the result is not sensitive to this hyperparameter. The final funnel reduces one-hundred-thousand transactions to fifty candidates to a budget B of at most eleven final anomalies.`,
  // 21
  `The quantum autoencoder has a unique property among the three QAD methods: it has two completely valid implementation paths that produce mathematically equivalent results by design. The simulation path requires zero qubits — it runs entirely on the CPU as a PCA computation. Standardise the transaction vector, project onto the top three principal components, decode back to the original dimension, and compute the residual as the anomaly score. This is the exact classical limit of the quantum circuit when the optimal compression is linear in the feature space, which our empirical analysis confirms is an excellent approximation. The hardware path requires sixteen qubits: eight data qubits to encode the input transaction via the ZZ feature map, and eight ancilla qubits to run the SWAP test for fidelity estimation. The Hardware Efficient Ansatz uses three layers of Ry, Rz, and CNOT ladder gates, totalling twenty-one CX gates per inference. Gate infidelity is approximately four percent — ZNE is advisable but manageable. Training in both cases happens on the CPU: the simulation path trains instantly via singular value decomposition, the hardware path trains via the parameter-shift rule with ninety-six circuit evaluations per gradient step over approximately two-hundred iterations. The critical point for deployment planning: the simulation path is not a compromise or an approximation. It is a deliberate, mathematically grounded design choice. Switch to the hardware path only when you have evidence that non-linear quantum effects in the compressed representation would provide additional discriminative power over PCA — which we expect to occur for high-dimensional, non-Gaussian transaction data beyond eight features. Autoencoder verdict: zero qubits today, sixteen qubits on hardware, twenty-one CX gates, four percent infidelity, ready on IBM Heron r2.`,

  // 22
  `The QAOA selection stage solves a problem that greedy top-B cannot: multiple high-scoring candidates may represent the same underlying fraud pattern. A card-cloning ring generating ten high-velocity transactions would all score highly but represent the same archetypally identical fraud. The diversity objective adds a pairwise penalty proportional to the quantum kernel similarity K-i-j between each pair of candidates. Selecting two transactions with high K-i-j uses up the investigation budget without increasing coverage of distinct fraud archetypes. When mu equals zero, the objective collapses to a cardinality-constrained linear programme equivalent to top-B. For mu equal to zero-point-three, the problem is a genuine binary quadratic programme, and greedy selection finds a suboptimal solution. QAOA processes all three-thousand feasible configurations simultaneously through quantum superposition.`,
  // 23
  `The connection between combinatorial optimisation and quantum physics is deep and exact, not just an analogy. The binary selection problem — choose B candidates from C to maximise anomaly coverage minus diversity penalty — is reformulated as finding the ground state of a spin-glass Hamiltonian. The reformulation is algebraic and lossless. Every binary variable z-i in zero-one is replaced by an Ising spin sigma-i in minus-one, plus-one using the exact substitution z-i equals one minus sigma-i over two. This converts the linear terms in z-i into Z-operator terms, and the quadratic terms in z-i times z-j into Z-i times Z-j coupling terms. The result is the Ising Hamiltonian H-C equals sum of h-i times Z-i plus sum of J-ij times Z-i times Z-j. The local field h-i encodes the net attractiveness of candidate i — its anomaly score minus its average similarity to other candidates minus the cardinality penalty contribution. The coupling J-ij encodes the cost of selecting both i and j simultaneously — the cardinality penalty plus the diversity penalty weighted by quantum kernel similarity. Finding the assignment of spins that minimises H-C is mathematically identical to finding the optimal selection of transactions. The quantum processor finds this minimum by physical evolution of a quantum system whose natural ground state is the spin configuration we want. The physics does the computation.`,

  // 24
  `The phase separator is the computational heart of QAOA. It takes the current quantum state — a superposition over all two-to-the-fourteen configurations — and multiplies each configuration's amplitude by a phase factor e to the minus i-gamma-E-of-z, where E of z is the energy of configuration z under the Ising Hamiltonian. Configurations with low energy — those representing good, diverse, high-scoring selections — get small phase shifts. Configurations with high energy — poor selections with low scores or excessive similarity — get large phase shifts. But here is the subtle point: phase shifts alone are invisible to measurement. You cannot directly observe the phase of a quantum amplitude. What the phase separator does is prepare the wavefunction for the next step — the mixer — which will convert phase differences into probability differences through interference. The implementation is elegant: because H-C is a sum of single-Z and two-body ZZ terms, the phase separator factorises into a product of independent rotations. Each h-i term becomes an Rz rotation on qubit i, costing one single-qubit gate. Each J-ij term becomes a ZZ rotation between qubits i and j, costing one two-qubit gate. For fourteen candidates, the phase separator requires fourteen single-qubit gates and ninety-one two-qubit gates per layer — a shallow circuit well within Heron's coherence budget.`,

  // 25
  `The mixer U-B of beta completes the QAOA cycle. It applies a rotation R-x of two-beta — a rotation around the x-axis of the Bloch sphere — to each qubit simultaneously. In the computational basis, this is equivalent to mixing amplitude between the state with candidate i selected and the state with candidate i not selected — a coherent bit-flip. The crucial mathematical property is non-commutativity: the Ising Hamiltonian H-C and the mixer sum-of-X-i do not commute. This means you cannot simultaneously diagonalise both operators in the same basis. In physical terms: the mixer creates quantum superpositions that explore configurations not reachable by classical local moves. It enables the algorithm to simultaneously increase the probability of selecting candidate A and decrease the probability of selecting candidate B in a single operation, without first measuring the current state. Alternating phase separator and mixer for p equals three layers is sufficient for near-optimal selection at C equals fourteen. The intuition: the first layer scores all configurations and creates phase differences. The second layer mixes these phases into amplitude differences. The third layer amplifies high-amplitude configurations through constructive interference. After three layers, measurement collapses the superposition to a near-optimal configuration with high probability — like a quantum orchestra where three rounds of scoring and remixing tunes all the instruments simultaneously toward the optimal chord.`,

  // 26
  `The QAOA circuit alternates between two types of evolution across p equals three layers. The phase separator U-C of gamma applies the Ising Hamiltonian H-C as a phase rotation, encoding the financial objective and diversity penalty into the quantum wavefunction. The mixer U-B of beta applies the transverse field, enabling exploration of the configuration space. Classical gradient descent can be trapped in a local minimum of the energy landscape. The quantum wavefunction penetrates barriers via tunnelling, reaching the global minimum — the optimal diverse selection — with high probability after three layers and three random restarts. The coupling J-i-j now contains a data-dependent term K-i-j: this is what makes H-C a genuine instance-specific quadratic programme and justifies using QAOA over a classical solver.`,
  // 27
  `QAOA is the most gate-intensive of the three methods, despite requiring the fewest qubits in absolute terms. The qubit count is simply C — the number of candidate transactions being selected from — which in our implementation is fourteen. One qubit per candidate: no ancilla, no extra registers. But the gate count is C times C minus one divided by two times p, where p is the number of QAOA layers. For C equals fourteen and p equals three, that is ninety-one ZZ gates per layer times three layers equals two-hundred-and-seventy-three two-qubit gates total. At zero-point-two percent error per gate on Heron r2, the accumulated infidelity before error mitigation is forty-two percent. This is high — but it is manageable with ZNE. Three noise levels reduce the residual to order epsilon-cubed, approximately zero-point-zero-zero-one percent, well within the AUC tolerance for the selection quality we need. The CPU does substantial work around the QAOA circuit: it computes the fused scores S-C for all fifty candidates, builds the fourteen-by-fourteen quantum kernel similarity matrix K-ij, constructs the Ising Hamiltonian coefficients h-i and J-ij, and after measurement, parses the marginal probabilities from the shot outcomes to select the final B transactions. Three random restarts are run in parallel where possible, and the best result is taken. Importantly, the circuit runs once per batch — not once per transaction — so the QPU time is fixed at approximately zero-point-six seconds regardless of batch size. QAOA verdict: fourteen qubits, two-hundred-and-seventy-three CX gates in three layers, forty-two percent raw infidelity requiring ZNE, IBM Heron r2 is more than sufficient at one-hundred-and-fifty-six qubits.`,

  // 28
  `The pollution bound quantifies how much the unsupervised mean state drifts from the supervised mean state when the reference set contains fraud. For Pipeline A with engineered features, the bound is zero-point-four-four-eight: the ZZ-encoded states of fraud and normal transactions are well separated in Hilbert space, so even a contaminated reference set produces a mean state close to the true normal mean. For Pipeline B with raw fields, the bound is one-point-three-one-eight: uninformative features like hour of day and account age dilute the ZZ signal, making fraud and normal states less distinguishable. The bound shrinks exponentially as the qubit count n increases. This exponential shrinkage is the mathematical foundation for the n-star crossing theorem.`,
  // 29
  `The n-star crossing theorem proves that for any contamination rate rho and feature dimension d, there exists a qubit count n-star above which the unsupervised pipeline achieves AUC within epsilon of the supervised pipeline. The simplified formula is n-star equals the ceiling of one over kappa times the logarithm of C-naught divided by rho times d. For the parameters of our payment-network experiment — kappa equal to zero-point-one-two, C-naught equal to one-point-five, d equal to eight, and rho equal to zero-point-zero-three-five — this gives n-star approximately twenty. IBM Heron r2 provides one-hundred-and-fifty-six physical qubits, exceeding this threshold. Exceeding n-star in qubit count is necessary but not sufficient: quantum error mitigation — specifically Zero-Noise Extrapolation — is also required to realise the theoretical AUC in practice.`,
  // 30
  `Here is a question that comes up consistently: n-star is only twenty qubits, IBM Heron r2 has one-hundred-and-fifty-six, so why do we still need error mitigation? The answer reveals a critical distinction between qubit count and circuit depth. The n-star theorem counts qubits. It says nothing about gates. The ZZ feature map for n equals twenty requires n times n minus one divided by two CX gates. That is one-hundred-and-ninety two-qubit gates for n equals twenty. On IBM Heron r2, each CX gate has an error rate of approximately zero-point-two percent. One-hundred-and-ninety gates at zero-point-two percent per gate gives an accumulated infidelity of one minus zero-point-nine-nine-eight to the power of one-hundred-and-ninety, which is approximately thirty-one percent. This means roughly a third of the circuit output is noise rather than signal. The physical consequence is that gate errors randomise the encoded phases, compressing the kernel score variance towards the random-state baseline of two-to-the-minus-n. This degrades the AUC, and can eliminate the n-star advantage entirely if left uncorrected. Zero-Noise Extrapolation addresses this directly. You run the same circuit at three amplified noise levels — one-times, two-times, and three-times the base noise, achieved by stretching gate durations. The kernel expectation value is measured at each noise level, and Richardson extrapolation fits a polynomial through the three data points and evaluates it at zero noise. With three noise levels, the residual error is order epsilon-cubed. For Heron r2 gate fidelity at n equals twenty, this is well within the AUC tolerance. The practical implication: the qubit count threshold is already met by current hardware, the gate-depth constraint is bridged by ZNE, and the pipeline is theoretically deployable on IBM Heron r2 today.`,

  // 31
  `Across thirty independent runs with time-seeded random number generation, the full QAD pipeline achieves AUC zero-point-seven-three-seven plus or minus zero-point-zero-zero-seven — statistically significantly better than all three classical baselines: Isolation Forest at zero-point-six-two-one, Local Outlier Factor at zero-point-five-nine-eight, and one-class SVM at zero-point-six-four-three. The hardware readiness stack distinguishes three tiers. The simulation tier, used in this work, runs exact state-vector computation on a classical computer. The near-term tier deploys on IBM Heron r2 with Zero-Noise Extrapolation applied to the ZZ-feature-map circuit. The fault-tolerant tier, expected post-two-thousand-and-thirty, uses logical qubits with error correction and achieves the full theoretical AUC for any contamination rate.`,
  // 32
  `We now have everything we need for a complete feasibility assessment of the full QAD pipeline. Running all three methods on a single batch of one-hundred-thousand transactions requires fifty qubits in total: twenty for the ZZ kernel at n-star, sixteen for the quantum autoencoder, and fourteen for QAOA. IBM Heron r2 provides one-hundred-and-fifty-six qubits — a factor-of-three margin. The gate counts are one-hundred-and-ninety, twenty-one, and two-hundred-and-seventy-three respectively, for a total of four-hundred-and-eighty-four CX gates across all three methods. The combined circuit can be executed in parallel — the three methods do not share qubits — bringing the total QPU time to approximately one-point-one seconds per batch on Heron r2 hardware. At IBM's cloud pricing, this costs under twenty-seven euros per batch. The deployment timeline has four phases. First, today: the simulation tier uses zero qubits and runs entirely on CPU, achieving AUC zero-point-seven-three-seven. Second, 2025 to 2026: the NISQ pilot deploys the ZZ kernel on QPU with Zero-Noise Extrapolation, keeping the autoencoder and QAOA on CPU. Third, 2026 to 2027: the full hybrid deployment moves all three methods to QPU, with ZNE applied to each. Fourth, 2030 and beyond: fault-tolerant logical qubits eliminate the need for error mitigation entirely, and the full theoretical AUC is achievable for any contamination rate. The binding constraint today is not hardware availability — IBM already provides sufficient qubits. The binding constraints are error mitigation engineering, software integration with existing fraud infrastructure, and latency. QPU round-trip time is currently measured in seconds — sufficient for batch scoring, but not yet for real-time transaction blocking at the microsecond level. Those latency improvements are an active area of hardware engineering and will arrive well within the deployment timeline.`,

  // 33
  `The QAD lifecycle provides a complete answer to the fraud detection problem. Phase one deploys the quantum pipeline unsupervised from day one — no labels required, novel fraud detected immediately. Phase two activates the calibration layer once enough labels accumulate, converting quantum scores to business-actionable fraud probabilities. Phase three runs continuously with monthly calibration refreshes. The n-star theorem guarantees that at twenty qubits — a threshold already exceeded by current IBM hardware — the label-free pipeline is as accurate as a fully labelled supervised model. As a working paper from Copenhagen Quantum, this framework represents, to our knowledge, the first combination of a quantum kernel, quantum autoencoder, and QAOA with a proven lifecycle model and a closed-form hardware milestone. For further information or collaboration, I am Tim Bruun Madsen, Founder of Copenhagen Quantum and PhD fellow in quantum finance.`
];
