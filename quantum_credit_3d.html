<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Quantum Credit Scoring — 3D Cluster Visualization</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500&family=Rajdhani:wght@300;400;500;600;700&display=swap');
:root{
  --bg:#020408;--panel:rgba(4,8,20,.85);--border:rgba(0,212,200,.15);
  --teal:#00d4c8;--gold:#f5a820;--purple:#8855ff;--rose:#ff4488;
  --green:#22cc88;--blue:#3399ff;--orange:#ff7733;--dim:#2a3a50;--text:#c0cfe0;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);
  font-family:'Rajdhani',sans-serif;color:var(--text);}
#canvas-wrap{position:absolute;inset:0;}
canvas{display:block;width:100%;height:100%;}

/* ── TOP BAR ─────────────────────────────── */
#topbar{position:absolute;top:0;left:0;right:0;height:52px;
  background:rgba(2,4,8,.8);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 18px;gap:14px;
  backdrop-filter:blur(8px);z-index:10;}
#logo{font-size:13px;font-weight:700;letter-spacing:2px;color:var(--teal);
  text-transform:uppercase;white-space:nowrap;}
.seg-btn{padding:5px 14px;border-radius:3px;border:1px solid var(--border);
  background:none;color:var(--text);font-family:'Rajdhani',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  cursor:pointer;transition:all .25s;}
.seg-btn:hover{border-color:var(--teal);color:var(--teal);}
.seg-btn.active{background:rgba(0,212,200,.12);border-color:var(--teal);color:var(--teal);}
#pca-info{margin-left:auto;font-size:10px;font-family:'Fira Code',monospace;
  color:var(--dim);letter-spacing:.8px;}
#rec-btn{padding:6px 14px;border-radius:3px;border:1px solid var(--rose);
  background:none;color:var(--rose);font-family:'Rajdhani',sans-serif;
  font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;
  cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:6px;}
#rec-btn:hover{background:rgba(255,68,136,.12);}
#rec-dot{width:7px;height:7px;border-radius:50%;background:var(--rose);}
#rec-btn.recording #rec-dot{animation:blink .7s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ── LEGEND ──────────────────────────────── */
#legend{position:absolute;right:18px;top:68px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:14px 16px;min-width:200px;
  backdrop-filter:blur(12px);z-index:10;}
#legend-title{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;
  color:var(--dim);font-family:'Fira Code',monospace;margin-bottom:10px;}
.leg-item{display:flex;align-items:center;gap:8px;margin-bottom:7px;cursor:pointer;
  transition:opacity .2s;}
.leg-item:hover{opacity:.7;}
.leg-item.hidden{opacity:.25;}
.leg-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.leg-label{font-size:11px;font-weight:600;letter-spacing:.5px;}
.leg-pd{font-size:9px;font-family:'Fira Code',monospace;color:var(--dim);margin-left:auto;}
.leg-type{font-size:8px;letter-spacing:.8px;text-transform:uppercase;
  padding:1px 5px;border-radius:2px;margin-left:4px;}
.leg-type.fn{background:rgba(255,119,51,.15);color:#ff7733;border:1px solid rgba(255,119,51,.3);}
.leg-type.fp{background:rgba(255,68,136,.15);color:#ff4488;border:1px solid rgba(255,68,136,.3);}

/* ── STATS PANEL ─────────────────────────── */
#stats{position:absolute;left:18px;bottom:18px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:12px 16px;
  backdrop-filter:blur(12px);z-index:10;min-width:240px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;
  margin-bottom:5px;gap:20px;}
.stat-label{font-size:9px;letter-spacing:1px;text-transform:uppercase;
  color:var(--dim);font-family:'Fira Code',monospace;}
.stat-val{font-size:11px;font-weight:600;color:var(--teal);font-family:'Fira Code',monospace;}

/* ── HOVERED TOOLTIP ─────────────────────── */
#tooltip{position:absolute;pointer-events:none;display:none;
  background:rgba(4,8,20,.95);border:1px solid var(--border);
  border-radius:6px;padding:10px 14px;font-size:11px;z-index:20;
  min-width:160px;backdrop-filter:blur(8px);}
#tooltip-arch{font-weight:700;margin-bottom:4px;font-size:12px;}
#tooltip-pd{font-family:'Fira Code',monospace;font-size:10px;color:var(--dim);}
#tooltip-pos{font-family:'Fira Code',monospace;font-size:9px;color:var(--dim);margin-top:3px;}

/* ── CONTROLS ────────────────────────────── */
#controls{position:absolute;left:18px;top:68px;
  background:var(--panel);border:1px solid var(--border);
  border-radius:8px;padding:12px 14px;
  backdrop-filter:blur(12px);z-index:10;}
.ctrl-label{font-size:9px;letter-spacing:1.2px;text-transform:uppercase;
  color:var(--dim);font-family:'Fira Code',monospace;margin-bottom:8px;}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
.ctrl-row label{font-size:10px;color:var(--text);width:56px;flex-shrink:0;}
.ctrl-row input[type=range]{width:90px;accent-color:var(--teal);height:3px;}
.ctrl-row span{font-size:9px;color:var(--teal);font-family:'Fira Code',monospace;width:28px;}
#auto-rotate{display:flex;align-items:center;gap:6px;cursor:pointer;margin-top:4px;}
#auto-rotate input{accent-color:var(--teal);}
#auto-rotate label{font-size:10px;color:var(--text);cursor:pointer;}

/* ── AXIS LABELS ─────────────────────────── */
.axis-label{position:absolute;font-family:'Fira Code',monospace;
  font-size:9px;color:rgba(192,207,224,.4);pointer-events:none;z-index:5;}

/* ── CINEMATIC MODE ──────────────────────── */
#cinematic-msg{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
  font-size:10px;letter-spacing:2px;text-transform:uppercase;
  color:rgba(0,212,200,.4);font-family:'Fira Code',monospace;
  pointer-events:none;opacity:0;transition:opacity 1s;}
#cinematic-msg.show{opacity:1;}

@media (max-width: 600px) {
  #topbar { padding: 0 8px; gap: 6px; height: 44px; }
  #logo { font-size: 9px; letter-spacing: 1px; }
  #left-panel, #right-panel { width: calc(50vw - 18px) !important; }
  #left-panel { left: 8px; top: 54px; }
  #right-panel { right: 8px; top: 54px; }
  .leg-name { font-size: 8px; }
  #ctrl-bar { bottom: 10px; gap: 6px; flex-wrap: wrap; justify-content: center; }
  #btn-go { font-size: 11px; padding: 8px 16px; }
}
</style>
</head>

</div>

<div id="tooltip">

  <div id="tooltip-pos"></div>
</div>

<script>
// ═══════════════════════════════════════════════════
// THREE.JS SETUP
// ═══════════════════════════════════════════════════
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x020408, 1);
renderer.shadowMap.enabled = false;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, 1, 0.01, 1000);
camera.position.set(14, 6, 14);
camera.lookAt(0,0,0);

// Resize
function resize(){
  const W=window.innerWidth, H=window.innerHeight;
  renderer.setSize(W, H, false);
  camera.aspect = W/H;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

// ── Orbit controls (manual) ─────────────────────
let isDragging=false, lastX=0, lastY=0;
let theta=0.5, phi=0.9, radius=18;
const pivot = new THREE.Object3D();
scene.add(pivot);

canvas.addEventListener('mousedown', e=>{isDragging=true;lastX=e.clientX;lastY=e.clientY;});
window.addEventListener('mouseup', ()=>{isDragging=false;});
window.addEventListener('mousemove', e=>{
  if(!isDragging)return;
  const dx=e.clientX-lastX, dy=e.clientY-lastY;
  theta -= dx*.006; phi = Math.max(.1, Math.min(Math.PI-.1, phi + dy*.006));
  lastX=e.clientX; lastY=e.clientY;
  document.getElementById('chk-auto').checked = false;
});
canvas.addEventListener('wheel', e=>{
  radius = Math.max(6, Math.min(50, radius + e.deltaY*.03));
});
// Touch
let lastTouchX=0, lastTouchY=0;
canvas.addEventListener('touchstart', e=>{
  lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
  document.getElementById('chk-auto').checked=false;
},{passive:true});
canvas.addEventListener('touchmove', e=>{
  const dx=e.touches[0].clientX-lastTouchX, dy=e.touches[0].clientY-lastTouchY;
  theta -= dx*.006; phi = Math.max(.1, Math.min(Math.PI-.1, phi+dy*.006));
  lastTouchX=e.touches[0].clientX; lastTouchY=e.touches[0].clientY;
},{passive:true});

// ── Axis grid ───────────────────────────────────
function makeGrid(){
  const mat = new THREE.LineBasicMaterial({color:0x1a2240, transparent:true, opacity:.35});
  const size=8, step=2;
  const g = new THREE.BufferGeometry();
  const pts=[];
  for(let i=-size;i<=size;i+=step){
    pts.push(-size,0,i, size,0,i);
    pts.push(i,0,-size, i,0,size);
  }
  g.setAttribute('position',new THREE.Float32BufferAttribute(pts,3));
  pivot.add(new THREE.LineSegments(g,mat));
  // Axis lines
  const ax=[
    [-size,0,0, size,0,0,0x00d4c8],
    [0,-size*.4,0, 0,size*.4,0,0xf5a820],
    [0,0,-size, 0,0,size,0x8855ff]
  ];
  ax.forEach(([x1,y1,z1,x2,y2,z2,col])=>{
    const ag=new THREE.BufferGeometry();
    ag.setAttribute('position',new THREE.Float32BufferAttribute([x1,y1,z1,x2,y2,z2],3));
    const am=new THREE.LineBasicMaterial({color:col,transparent:true,opacity:.5});
    pivot.add(new THREE.LineSegments(ag,am));
  });
}
makeGrid();

// ── Point cloud creation ────────────────────────
const pointGroups = {}; // arch → {mesh, data}
let currentDataset = 'retail';
let spreadScale = 1.0;
let ptSize = 0.07;
const hiddenArchs = new Set();

function hexToColor(hex){
  const r=parseInt(hex.slice(1,3),16)/255;
  const g=parseInt(hex.slice(3,5),16)/255;
  const b=parseInt(hex.slice(5,7),16)/255;
  return new THREE.Color(r,g,b);
}

function buildPoints(data, scale){
  // Clear old
  Object.values(pointGroups).forEach(g=>{
    pivot.remove(g.mesh);
    g.mesh.geometry.dispose();
    g.mesh.material.dispose();
  });
  Object.keys(pointGroups).forEach(k=>delete pointGroups[k]);

  data.forEach(cluster=>{
    const pts = cluster.pts;
    const n = pts.length;
    const positions = new Float32Array(n*3);
    const colors    = new Float32Array(n*3);
    const sizes     = new Float32Array(n);
    const col = hexToColor(cluster.color);

    pts.forEach((p,i)=>{
      positions[i*3]   = p[0]*scale;
      positions[i*3+1] = p[2]*scale;  // use PC3 as Y for 3D
      positions[i*3+2] = p[1]*scale;
      colors[i*3]   = col.r;
      colors[i*3+1] = col.g;
      colors[i*3+2] = col.b;
      sizes[i] = ptSize;
    });

    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
    geo.setAttribute('aColor',   new THREE.BufferAttribute(colors,3));
    geo.setAttribute('size',     new THREE.BufferAttribute(sizes,1));

    // Custom shader material for beautiful glowing points
    const mat = new THREE.ShaderMaterial({
      vertexColors: false,
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      uniforms:{
        uSize:{value: ptSize*window.devicePixelRatio*120},
        uOpacity:{value: hiddenArchs.has(cluster.arch)?0.0:0.9},
        uTime:{value:0}
      },
      vertexShader:`
        attribute float size;
        attribute vec3 aColor;
        varying vec3 vColor;
        uniform float uSize;
        void main(){
          vColor=aColor;
          vec4 mvPos=modelViewMatrix*vec4(position,1.0);
          gl_PointSize=uSize/(-mvPos.z);
          gl_Position=projectionMatrix*mvPos;
        }`,
      fragmentShader:`
        varying vec3 vColor;
        uniform float uOpacity;
        void main(){
          float d=length(gl_PointCoord-.5)*2.0;
          if(d>1.0)discard;
          float alpha=uOpacity*(1.0-smoothstep(.4,1.0,d));
          // Glow core
          float core=1.0-smoothstep(0.0,.35,d);
          vec3 finalCol=vColor+vColor*core*.8;
          gl_FragColor=vec4(finalCol,alpha);
        }`
    });

    const mesh = new THREE.Points(geo, mat);
    mesh.userData = {arch:cluster.arch, label:cluster.label, color:cluster.color, pd:cluster.pd};
    pivot.add(mesh);
    pointGroups[cluster.arch] = {mesh, data:cluster};
  });
}

// ── Cluster centroid labels (sprite) ────────────
const centroidLabels = [];
function makeCentroidLabel(text, pos, color){
  const canvas2 = document.createElement('canvas');
  canvas2.width=512; canvas2.height=64;
  const ctx=canvas2.getContext('2d');
  ctx.clearRect(0,0,512,64);
  ctx.font='bold 22px Rajdhani, sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle=color;
  ctx.fillText(text,256,32);
  const tex=new THREE.CanvasTexture(canvas2);
  const mat=new THREE.SpriteMaterial({map:tex,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});
  const sp=new THREE.Sprite(mat);
  sp.position.set(pos.x,pos.y+.9,pos.z);
  sp.scale.set(3.5,.44,1);
  return sp;
}

function buildCentroidLabels(data, scale){
  centroidLabels.forEach(l=>pivot.remove(l));
  centroidLabels.length=0;
  data.forEach(cluster=>{
    const pts=cluster.pts;
    let ax=0,ay=0,az=0;
    pts.forEach(p=>{ax+=p[0];ay+=p[2];az+=p[1];});
    ax/=pts.length; ay/=pts.length; az/=pts.length;
    const sp=makeCentroidLabel(cluster.label, {x:ax*scale,y:ay*scale,z:az*scale}, cluster.color);
    pivot.add(sp);
    centroidLabels.push(sp);
  });
}

// ── Decision surface (semi-transparent plane) ───
let decisionPlane = null;
function buildDecisionSurface(data, scale){
  if(decisionPlane){pivot.remove(decisionPlane);decisionPlane=null;}
  // Approximate PD=0.5 boundary as a plane in x
  const allPts=[];
  data.forEach(cl=>cl.pts.forEach(p=>allPts.push({x:p[0]*scale, pd:cl.pd})));
  // Simple threshold: find x midpoint between safe centroid and unsafe centroid
  const safe=data.filter(cl=>cl.pd<0.5);
  const unsafe=data.filter(cl=>cl.pd>=0.5);
  if(!safe.length||!unsafe.length)return;
  let safeX=0, unsafeX=0, nsafe=0, nunsafe=0;
  safe.forEach(cl=>cl.pts.forEach(p=>{safeX+=p[0]*scale;nsafe++;}));
  unsafe.forEach(cl=>cl.pts.forEach(p=>{unsafeX+=p[0]*scale;nunsafe++;}));
  const midX=(safeX/nsafe+unsafeX/nunsafe)/2;
  const geo=new THREE.PlaneGeometry(0.05, 14, 1, 1);
  const mat=new THREE.MeshBasicMaterial({
    color:0x00d4c8, transparent:true, opacity:.08,
    side:THREE.DoubleSide, depthWrite:false
  });
  decisionPlane=new THREE.Mesh(geo, mat);
  decisionPlane.rotation.y=Math.PI/2;
  decisionPlane.position.set(midX, 0, 0);
  decisionPlane.scale.set(1,1,200);
  pivot.add(decisionPlane);
}

// ── Build legend ────────────────────────────────
function buildLegend(data){
  const leg=document.getElementById('legend');
  // clear old items
  [...leg.querySelectorAll('.leg-item')].forEach(el=>el.remove());
  data.forEach(cl=>{
    const div=document.createElement('div');
    div.className='leg-item';
    div.dataset.arch=cl.arch;
    const isFN=cl.label.includes('★FN');
    const isFP=cl.label.includes('★FP');
    const cleanLabel=cl.label.replace(' ★FN','').replace(' ★FP','');
    div.innerHTML=`
      <div class="leg-dot" style="background:${cl.color};box-shadow:0 0 6px ${cl.color}88"></div>
      <span class="leg-label">${cleanLabel}</span>
      ${isFN?'<span class="leg-type fn">FN</span>':''}
      ${isFP?'<span class="leg-type fp">FP</span>':''}
      <span class="leg-pd">${Math.round(cl.pd*100)}%</span>`;
    div.addEventListener('click',()=>toggleArch(cl.arch, div));
    if(hiddenArchs.has(cl.arch))div.classList.add('hidden');
    leg.appendChild(div);
  });
}

function toggleArch(arch, div){
  if(hiddenArchs.has(arch)){
    hiddenArchs.delete(arch);
    div.classList.remove('hidden');
    if(pointGroups[arch])pointGroups[arch].mesh.material.uniforms.uOpacity.value=0.9;
  } else {
    hiddenArchs.add(arch);
    div.classList.add('hidden');
    if(pointGroups[arch])pointGroups[arch].mesh.material.uniforms.uOpacity.value=0.0;
  }
}

// ── Stats update ────────────────────────────────
function updateStats(data, varArr){
  const n=data.reduce((a,cl)=>a+cl.pts.length,0);
  const varTotal=(varArr[0]+varArr[1]+varArr[2]).toFixed(1);
  const fnCount=data.filter(cl=>cl.label.includes('★FN')).length;
  const fpCount=data.filter(cl=>cl.label.includes('★FP')).length;
  document.getElementById('stat-n').textContent=n;
  document.getElementById('stat-var').textContent=varTotal+'%';
  document.getElementById('pca-info').textContent=
    `PC-1: ${varArr[0]}%  PC-2: ${varArr[1]}%  PC-3: ${varArr[2]}%`;
  // update FN/FP stats
  document.querySelectorAll('.stat-val')[2].textContent=fnCount+' types';
  document.querySelectorAll('.stat-val')[3].textContent=fpCount+' type'+( fpCount===1?'':'s');
}

// ── Switch dataset ───────────────────────────────
let activeData = RETAIL_DATA;
let activeVar  = RETAIL_VAR;

function switchTo(name){
  currentDataset=name;
  hiddenArchs.clear();
  let data, varArr;
  if(name==='retail'){data=RETAIL_DATA; varArr=RETAIL_VAR;}
  else if(name==='sme'){data=SME_DATA; varArr=SME_VAR;}
  else{
    // both: offset SME on Z axis
    const combined=[
      ...RETAIL_DATA.map(cl=>({...cl, pts:cl.pts.map(p=>[p[0],p[1],p[2]-2])})),
      ...SME_DATA.map(cl=>({...cl, pts:cl.pts.map(p=>[p[0]+2,p[1],p[2]+2]), label:'SME: '+cl.label.replace(' ★FN',' FN').replace(' ★FP',' FP')}))
    ];
    data=combined;
    varArr=[Math.max(RETAIL_VAR[0],SME_VAR[0]), Math.max(RETAIL_VAR[1],SME_VAR[1]), Math.max(RETAIL_VAR[2],SME_VAR[2])];
  }
  activeData=data; activeVar=varArr;
  buildPoints(data, spreadScale);
  buildCentroidLabels(data, spreadScale);
  buildDecisionSurface(data, spreadScale);
  buildLegend(data);
  updateStats(data, varArr);
  // update buttons
  document.querySelectorAll('.seg-btn').forEach(b=>b.classList.remove('active'));
  if(name==='retail')document.getElementById('btn-retail').classList.add('active');
  else if(name==='sme')document.getElementById('btn-sme').classList.add('active');
  else document.getElementById('btn-both').classList.add('active');
}

document.getElementById('btn-retail').addEventListener('click',()=>switchTo('retail'));
document.getElementById('btn-sme').addEventListener('click',()=>switchTo('sme'));
document.getElementById('btn-both').addEventListener('click',()=>switchTo('both'));

// ── Controls ─────────────────────────────────────
document.getElementById('speed').addEventListener('input',e=>{
  document.getElementById('speed-val').textContent=parseFloat(e.target.value).toFixed(2)+'×';
});
document.getElementById('ptsize').addEventListener('input',e=>{
  ptSize=parseFloat(e.target.value);
  document.getElementById('ptsize-val').textContent=Math.round(ptSize*100);
  Object.values(pointGroups).forEach(g=>{
    g.mesh.material.uniforms.uSize.value=ptSize*window.devicePixelRatio*120;});
});
document.getElementById('spread').addEventListener('input',e=>{
  spreadScale=parseFloat(e.target.value);
  document.getElementById('spread-val').textContent=spreadScale.toFixed(2);
  buildPoints(activeData, spreadScale);
  buildCentroidLabels(activeData, spreadScale);
  buildDecisionSurface(activeData, spreadScale);
});

// ── Raycasting for hover tooltip ─────────────────
const raycaster=new THREE.Raycaster();
raycaster.params.Points.threshold=0.25;
const mouse=new THREE.Vector2(-9,-9);
const tooltip=document.getElementById('tooltip');
window.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  tooltip.style.left=(e.clientX+14)+'px';
  tooltip.style.top=(e.clientY-10)+'px';
});

let autoRotate=true;
document.getElementById('chk-auto').addEventListener('change',e=>{autoRotate=e.target.checked;});

// ── Recording ────────────────────────────────────
let mediaRecorder=null, recordedChunks=[];
document.getElementById('rec-btn').addEventListener('click',()=>{
  if(!mediaRecorder||mediaRecorder.state==='inactive'){
    recordedChunks=[];
    const stream=canvas.captureStream(60);
    mediaRecorder=new MediaRecorder(stream,{mimeType:'video/webm;codecs=vp9',videoBitsPerSecond:8000000});
    mediaRecorder.ondataavailable=e=>{if(e.data.size>0)recordedChunks.push(e.data);};
    mediaRecorder.onstop=()=>{
      const blob=new Blob(recordedChunks,{type:'video/webm'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='quantum_credit_clusters_3d.webm';
      a.click();
    };
    mediaRecorder.start();
    document.getElementById('rec-btn').classList.add('recording');
    document.getElementById('rec-btn').innerHTML='<span id="rec-dot"></span>Stop';
  } else {
    mediaRecorder.stop();
    document.getElementById('rec-btn').classList.remove('recording');
    document.getElementById('rec-btn').innerHTML='<span id="rec-dot"></span>Record';
    mediaRecorder=null;
  }
});

// ── Init ─────────────────────────────────────────
switchTo('retail');

// Show cinematic hint
setTimeout(()=>{
  document.getElementById('cinematic-msg').classList.add('show');
  setTimeout(()=>document.getElementById('cinematic-msg').classList.remove('show'),4000);
},1500);

// ── Render loop ──────────────────────────────────
let time=0;
function animate(){
  requestAnimationFrame(animate);
  time += 0.016;

  // Auto-rotate
  if(autoRotate&&document.getElementById('chk-auto').checked){
    const spd=parseFloat(document.getElementById('speed').value)*0.007;
    theta += spd;
  }

  // Update camera from spherical coords
  camera.position.x = radius * Math.sin(phi) * Math.sin(theta);
  camera.position.y = radius * Math.cos(phi);
  camera.position.z = radius * Math.sin(phi) * Math.cos(theta);
  camera.lookAt(0,0,0);

  // Update shader time + pulse point sizes
  Object.values(pointGroups).forEach(g=>{
    g.mesh.material.uniforms.uTime.value = time;
  });

  // Raycasting
  raycaster.setFromCamera(mouse, camera);
  let hit=false;
  Object.values(pointGroups).forEach(g=>{
    if(hiddenArchs.has(g.data.arch))return;
    const intersects=raycaster.intersectObject(g.mesh);
    if(intersects.length>0&&!hit){
      hit=true;
      const idx=intersects[0].index;
      const pos=g.mesh.geometry.attributes.position;
      const x=pos.getX(idx).toFixed(2), y=pos.getY(idx).toFixed(2), z=pos.getZ(idx).toFixed(2);
      document.getElementById('tooltip-arch').textContent=g.data.label.replace(' ★FN','').replace(' ★FP','');
      document.getElementById('tooltip-arch').style.color=g.data.color;
      document.getElementById('tooltip-pd').textContent=`PD = ${Math.round(g.data.pd*100)}%`;
      document.getElementById('tooltip-pos').textContent=`PC1:${x}  PC2:${z}  PC3:${y}`;
      tooltip.style.display='block';
    }
  });
  if(!hit)tooltip.style.display='none';

  renderer.render(scene, camera);
}
animate();
</script>
